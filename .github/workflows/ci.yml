name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    name: Build, vet, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go from go.mod policy
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/bwb

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
