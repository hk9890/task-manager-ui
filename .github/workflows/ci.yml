name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    name: Validate scripts, lint, build, vet, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise (handles Go toolchain via .mise.toml)
        uses: jdx/mise-action@v2

      - name: Scripts syntax
        run: mise run scripts

      - name: Lint
        run: mise run lint

      - name: Build
        run: mise run build

      - name: Vet
        run: mise run vet

      - name: Architecture guardrails
        run: mise run guardrails

      - name: Unit tests
        run: mise run test

      - name: Integration tests
        run: mise run test:integration
