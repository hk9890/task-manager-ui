name: CI

on:
  push:
  pull_request:

# Ratchet this value upward as coverage improves (baseline 76.5% measured 2026-05-16).
# Current gate is ~5pts below baseline. To raise: update this value and open a PR.
env:
  COVERAGE_THRESHOLD: 71

jobs:
  quality-gates:
    name: Validate scripts, lint, build, vet, and test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install mise (handles Go toolchain via .mise.toml)
        uses: jdx/mise-action@v4

      - name: Scripts syntax
        if: matrix.os != 'windows-latest'
        run: mise run scripts

      - name: Format check
        if: matrix.os != 'windows-latest'
        run: mise run fmt:check

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: mise run lint

      - name: Build
        run: mise run build

      - name: Vet
        run: mise run vet

      - name: Architecture guardrails
        if: matrix.os == 'ubuntu-latest'
        run: mise run guardrails

      - name: Unit tests
        run: mise run test

      - name: Tests + coverage gate
        if: matrix.os == 'ubuntu-latest'
        run: mise run test:coverage
