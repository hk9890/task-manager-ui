name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default: CI only needs to read the repo. Fork PRs get a
# read-only token automatically; this makes that explicit for same-repo runs too.
permissions:
  contents: read

# Ratchet this value upward as coverage improves.
# Gate sits a couple of points below current to absorb minor fluctuation.
env:
  COVERAGE_THRESHOLD: 69

jobs:
  quality-gates:
    name: Validate scripts, lint, build, vet, and test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # linux + macOS are the supported/released platforms (see .goreleaser.yaml).
        # Windows is not a release target and the file-based store backend does not
        # support Windows directory fsync, so it is intentionally excluded.
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mise (handles Go toolchain via .mise.toml)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          # Pin the mise binary to a known-good release rather than auto-floating
          # "latest"; bump deliberately.
          version: 2026.5.15

      - name: Scripts syntax
        if: matrix.os != 'windows-latest'
        run: mise run scripts:check

      - name: Format check
        if: matrix.os != 'windows-latest'
        run: mise run fmt:check

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: mise run lint

      - name: Build
        if: matrix.os != 'windows-latest'
        run: mise run build

      - name: Vet
        run: mise run vet

      - name: Architecture guardrails
        if: matrix.os == 'ubuntu-latest'
        run: mise run guardrails

      - name: Unit tests
        run: mise run test

      - name: Tests + coverage gate
        if: matrix.os == 'ubuntu-latest'
        run: mise run test:coverage
