name: Claude Code Review

# Automated PR review.
#
# AUTO-REVIEW IS ON: every newly-opened PR gets one Claude review (on `opened`,
# not on every push). The `if:` guard below skips Dependabot/bot PRs so they
# don't burn Claude (Max subscription) quota. Other ways to use it:
#
#   * On demand: comment "@claude review this PR" on any PR. Handled by
#     claude.yml — useful to re-review after pushing changes.
#   * Manual: run this workflow from the Actions tab (workflow_dispatch).
#   * To disable auto-review, comment out the `pull_request:` block below.

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened]        # one review when a PR is opened (not on every push)

jobs:
  review:
    # When auto-enabled, skip bot PRs (Dependabot etc.) so they don't burn quota.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the pull request for correctness, bugs, missing test coverage,
            and adherence to the conventions in AGENTS.md and docs/. Leave
            concise, specific, actionable inline comments; avoid nitpicking.
