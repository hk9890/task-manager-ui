name: Release

# Tag-triggered auto-release is temporarily disabled while the private-repo
# GitHub Actions billing is paused. Releases are built and published
# locally with `goreleaser release` against a tagged commit; see
# docs/RELEASING.md (Local release fallback section).
#
# Re-enable by restoring the `push: tags: v*` trigger when Actions billing
# is restored.
on:
  workflow_dispatch:

# Top-level least-privilege default; the release job widens itself locally.
permissions:
  contents: read

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write       # write release notes + upload assets
      id-token: write       # cosign keyless signing + SLSA attestation OIDC
      attestations: write   # actions/attest-build-provenance writes attestations
    env:
      # The product depends on the PRIVATE module github.com/hk9890/task-manager/sdk.
      # GOPRIVATE bypasses the module proxy + checksum DB for it; the "Authenticate
      # private module access" step below supplies the credential git needs to fetch it.
      GOPRIVATE: github.com/hk9890/task-manager
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Do not persist the default GITHUB_TOKEN as a git Authorization
          # header: it cannot read the private task-manager SDK, and it would
          # collide with the PAT header set below ("Duplicate header"). All
          # later git ops are local reads or use the PAT extraheader.
          persist-credentials: false

      - name: Set up Go from go.mod policy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Authenticate private module access
        # The default GITHUB_TOKEN cannot read the separate private repo
        # hk9890/task-manager. Configure an explicit Authorization header with
        # the PAT secret (Contents:Read on that repo) so every subsequent go
        # module fetch authenticates as the PAT. An explicit extraheader takes
        # precedence over actions/checkout's persisted default-token header.
        env:
          TASKMGR_SDK_TOKEN: ${{ secrets.TASKMGR_SDK_TOKEN }}
        run: |
          set -uo pipefail
          if [ -z "${TASKMGR_SDK_TOKEN}" ]; then
            echo "::error::TASKMGR_SDK_TOKEN secret is not set; cannot fetch the private task-manager SDK." >&2
            exit 1
          fi
          auth=$(printf 'x-access-token:%s' "${TASKMGR_SDK_TOKEN}" | base64 -w0)
          git config --global "http.https://github.com/.extraheader" "AUTHORIZATION: basic ${auth}"
          # Probe the private SDK repo so this step fails fast with a clear
          # diagnostic instead of an opaque `go build` error downstream.
          # Write the probe's stderr OUTSIDE the repo workspace so it cannot
          # dirty the git tree (goreleaser refuses to release on a dirty tree).
          probe_err="${RUNNER_TEMP:-/tmp}/sdk-probe.err"
          echo "Probing read access to hk9890/task-manager ..."
          if git ls-remote https://github.com/hk9890/task-manager HEAD >/dev/null 2>"${probe_err}"; then
            echo "OK: PAT can read hk9890/task-manager"
          else
            echo "::error::PAT cannot read hk9890/task-manager:" >&2
            sed 's/^/  /' "${probe_err}" >&2
            echo "::error::Fix TASKMGR_SDK_TOKEN: a fine-grained PAT, owner hk9890, repo hk9890/task-manager selected, Contents:Read, not expired." >&2
            exit 1
          fi

      - name: Build
        run: go build ./cmd/taskmgr-ui

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin to latest v2.x: cosign v3 defaults to --new-bundle-format, which
          # deprecates/ignores the --output-signature/--output-certificate flags
          # in .goreleaser.yaml and then aborts ("create bundle file"). v2.x keeps
          # the documented .sig/.pem signing flow (docs/RELEASING.md verification).
          cosign-release: 'v2.6.3'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA build provenance for release archives
        # Produces a signed attestation linking each released archive's digest
        # to this workflow + commit. Verifiable with `gh attestation verify`.
        # Non-fatal: actions/attest-build-provenance is unavailable on
        # user-owned PRIVATE repos ("Feature not available for user-owned
        # private repositories"). The release (binaries + cosign sig/cert +
        # SBOMs) is already published by the GoReleaser step above; provenance
        # is best-effort and starts working if the repo goes public or org-owned.
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*_checksums.txt
