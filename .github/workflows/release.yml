name: Release

# Tag-triggered auto-release is temporarily disabled while the private-repo
# GitHub Actions billing is paused. Releases are built and published
# locally with `goreleaser release` against a tagged commit; see
# docs/RELEASING.md (Local release fallback section).
#
# Re-enable by restoring the `push: tags: v*` trigger when Actions billing
# is restored.
on:
  workflow_dispatch:

# Top-level least-privilege default; the release job widens itself locally.
permissions:
  contents: read

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write       # write release notes + upload assets
      id-token: write       # cosign keyless signing + SLSA attestation OIDC
      attestations: write   # actions/attest-build-provenance writes attestations
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go from go.mod policy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/bwb

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA build provenance for release archives
        # Produces a signed attestation linking each released archive's digest
        # to this workflow + commit. Verifiable with `gh attestation verify`.
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*_checksums.txt
