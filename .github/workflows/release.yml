name: Release

# Releases are published by manually dispatching this workflow against a release
# tag (see docs/RELEASING.md). Kept on workflow_dispatch rather than auto-firing
# on `push: tags: v*` so that re-tagging / history maintenance does not trigger
# unintended releases; switch to a tag trigger if you want push-to-release.
on:
  workflow_dispatch:

# Top-level least-privilege default; the release job widens itself locally.
permissions:
  contents: read

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write       # write release notes + upload assets
      id-token: write       # cosign keyless signing + SLSA attestation OIDC
      attestations: write   # actions/attest-build-provenance writes attestations
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go from go.mod policy
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/taskmgr-ui

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin to latest v2.x: cosign v3 defaults to --new-bundle-format, which
          # deprecates/ignores the --output-signature/--output-certificate flags
          # in .goreleaser.yaml and then aborts ("create bundle file"). v2.x keeps
          # the documented .sig/.pem signing flow (docs/RELEASING.md verification).
          cosign-release: 'v2.6.3'

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA build provenance for release archives
        # Produces a signed attestation linking each released archive's digest
        # to this workflow + commit. Verifiable with `gh attestation verify`.
        # Non-fatal: actions/attest-build-provenance is unavailable on
        # user-owned PRIVATE repos ("Feature not available for user-owned
        # private repositories"). The release (binaries + cosign sig/cert +
        # SBOMs) is already published by the GoReleaser step above; provenance
        # is best-effort and starts working if the repo goes public or org-owned.
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*_checksums.txt
