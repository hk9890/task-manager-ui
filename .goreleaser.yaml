version: 2

project_name: taskmgr-ui

builds:
  - id: taskmgr-ui
    main: ./cmd/taskmgr-ui
    binary: taskmgr-ui
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/hk9890/task-manager-ui/internal/version.Version={{ .Version }}
      - -X github.com/hk9890/task-manager-ui/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/hk9890/task-manager-ui/internal/version.Date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: taskmgr-ui-archives
    ids:
      - taskmgr-ui
    formats:
      - tar.gz
    files:
      - none*
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_{{ if eq .Arch "amd64" }}x64{{ else if eq .Arch "386" }}x86{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

signs:
  - cmd: cosign
    artifacts: checksum
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}

sboms:
  - artifacts: archive
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "spdx-json=${document}"
