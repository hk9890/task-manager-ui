version: 2

project_name: bwb

builds:
  - id: bwb
    main: ./cmd/bwb
    binary: bwb
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: bwb-archives
    ids:
      - bwb
    formats:
      - tar.gz
    files:
      - none*
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_{{ if eq .Arch "amd64" }}x64{{ else if eq .Arch "386" }}x86{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
