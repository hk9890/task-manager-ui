id: 01hfznoo
author: Hans Kohlreiter
created: 2026-04-09T14:03:42Z
body: |-
  Plan review — simplification opportunity. What: ekp.1 (documentation task) should be folded into ekp.2 as a deliverable, not a separate task. The docs produced by ekp.1 describe architectural decisions that only become real when ekp.2 lands. A standalone doc-writing task before implementation risks producing aspirational architecture that gets revised during extraction anyway. Why: separating 'write docs about what we will do' from 'do it and document it' adds a round-trip for no value. The tasker implementing ekp.2 will need to make the real boundary decisions during extraction, and those decisions should drive the docs. Suggested action: merge ekp.1 acceptance criteria into ekp.2 (add 'update docs/CODING.md with row/list/panel/detail architecture guidance' as a final step in ekp.2's instructions) and close ekp.1 as folded into ekp.2.
