id: xc7vt4ig
author: Hans Kohlreiter
created: 2026-04-09T14:04:53Z
body: |-
  Review finding: hidden risk — search golden files will break and that is the point, but the task should say so. What: search has 4 golden tests (search_results_preview_w120, search_empty_results_w120, search_results_narrow_w80, search_default_all_results_w120) that assert the current plain-text row format. When ekp.2 switches search to the styled shared renderer, every one of these goldens will need to be regenerated (the test harness supports BWB_UPDATE_GOLDEN=1 for this). The board also has goldens but those should only change if the row contract changes. Why: ekp.2's instructions mention 'board/search/shared renderer tests and goldens as needed' but do not call out that search golden regeneration is mandatory, not optional. A tasker might treat golden breakage as a bug rather than expected. Suggested action: add to ekp.2 instructions: 'Search golden files will break when adopting the styled shared renderer. Regenerate them with BWB_UPDATE_GOLDEN=1 and verify the diff shows the expected styling change.'
