  Implemented (with orchestrator fix-up — original tasker's render-signature change was inconsistent with tests and left build broken). Final approach: parse-side only. ParseIssueEditDocument now: (1) rejects content with multiple BWB:EDITABLE:END markers, (2) rejects description containing any BWB: token via issueEditCheckDescriptionForMarkers, (3) extracts post-description fields from afterDesc substring (after issueEditFieldDescriptionEnd) — the 'find marker AFTER section heading' strategy. Render signature kept as string (single return). 4 security tests pass; full quality gate green.
