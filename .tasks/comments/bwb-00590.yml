id: xsq1z9yg
author: Hans Kohlreiter
created: 2026-04-12T13:07:46Z
body: |-
  Post-implementation UX feedback changed direction: the left issue browser should become a true side panel rather than a nested focusable area inside issue detail. Desired model is closer to dashboard browsing where selection updates adjacent detail. Also noted: focus behavior should be consistent app-wide, metadata fields could become Enter-editable (status/priority are good candidates), and the current layout under-uses full screen width.
