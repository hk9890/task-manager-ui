id: xx5h2l0c
author: Hans Kohlreiter
created: 2026-04-12T10:59:11Z
body: |-
  Missing prerequisite: IssueReference enrichment. What: the implementation plan assumes rail rows will show type, priority, and status (from research syf.1 row content spec), but domain.IssueReference only carries ID and Title. The gateway already receives these fields from bd show --json but discards them. None of the three implementation tasks include gateway or domain model changes in their files-to-modify lists. Why: this is a blocking gap — syf.3 cannot render the specified row format without data that doesn't exist in the model. Suggested action: add a prerequisite task (before syf.3) to enrich IssueReference with Type/Status/Priority fields and update the gateway parser, or descope the row renderer to ID+title only.
