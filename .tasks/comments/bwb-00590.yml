  Epic scope gap: no implementation tasks after research. What: the epic has only two children — syf.1 (research) and syf.2 (acceptance review). There are zero implementation tasks. Why: after the research task resolves the design questions, someone still needs to create implementation tasks. The epic's success criteria say 'follow up implementation tasks can be created without ambiguity' but this is a success criterion for the research task, not the epic. The epic's own success criteria don't describe a working left rail, only a research output. Suggested action: clarify whether this epic is intentionally research-only (in which case rename it to reflect that) or whether implementation tasks will be added after syf.1 completes (in which case add an explicit note that the epic will be expanded after research approval).
