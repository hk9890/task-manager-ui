body: |-
  Review: This is a feature request, not a bug — current behavior is as designed (status-only editing). Reclassify as type:task or type:enhancement. Hidden complexity: adding field selection requires (1) defining which metadata fields are editable vs read-only, (2) an edit interaction model per field type (priority is numeric, owner is text/selector, labels are multi-value), (3) rendering selected-field highlighting in metadata pane. What: the description says 'up/down field selection and Enter-based editing' but doesn't specify which fields or what the edit UX looks like for non-status fields. Why: without scoping which fields are editable and how, this will balloon into an open-ended design task. Suggested action: constrain to status + priority only as v1, with explicit edit interaction for each (status=dialog, priority=cycle or dialog). Defer labels/owner editing.
