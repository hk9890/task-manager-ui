id: gulq6j00
author: Hans Kohlreiter
created: 2026-04-18T20:23:52Z
body: |-
  Set review — scope constraint is good but edit UX still undefined. What: the description says 'enter triggers the correct edit action' and scope constraint says 'status and priority only', but it doesn't specify what the edit interaction IS for priority. Status already has a dialog — what does priority editing look like? Cycle through P0-P5? A dialog? Inline text entry? Why: without specifying the interaction model, this will stall during implementation. The field navigation part (up/down between status and priority) is trivial; the edit UX is where the real work lives. Suggested action: specify 'priority edit = cycle P0→P1→P2→P3→P4→P5→P0 on Enter' or similar concrete interaction. Also: the existing metadataField struct already has an editable bool — add editable:true to Priority in metadataGroups and add MetadataFieldPriority constant. This is the only new feature in the set; defer it to last.
