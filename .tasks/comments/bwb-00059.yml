id: q04epwxf
author: Hans Kohlreiter
created: 2026-04-12T14:06:57Z
body: |-
  Plan structure is sound but has one gap that will stall execution: the left browser panel data source. What: The dependency graph (.4 → .1, .4 → .2, then .3, then acceptance) is correct. The task decomposition is reasonable — sizing contract, panel promotion, metadata actions, acceptance. However, all tasks downstream of .4 depend on a decision .4 does not explicitly surface: what data populates the left browser panel in detail mode? The user says 'similar to browsing issues in the dashboard' which implies the board/search issue list carries over into detail, but this is not stated in any task. Why: This is the single decision that determines whether .2 is a 'rewire existing related-issues rail' task or a 'build new issue-list passthrough from board/search into detail' task. These are materially different in scope and wiring. Suggested action: Add this as an explicit question to .4 and resolve it before unblocking. Also add .1 and .2 as dependencies for .3 — they are currently missing.
