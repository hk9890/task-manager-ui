author: Hans Kohlreiter
created: 2026-04-12T16:09:48Z
body: |-
  Discussion resolved the core panel contract: the special left browser panel exists only in issue details view, not board/search; it should show a stable parent-group context (parent issue plus sibling child issues), and selecting items there updates center/right detail without changing the left panel contents. Added a dedicated backend task for parent-group browser context because current domain/gateway models do not expose parent/child grouping.
