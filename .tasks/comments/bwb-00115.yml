  Approach decision (orchestrator + user, 2026-05-20): use candidate approach 1 — per-process log filename. The persistent sink will write to a process-unique path (bwb-<session_id>.log preferred since session_id is already a log field; bwb-<pid>.log as fallback if session_id is not available at sink-construction time), eliminating the cross-process rotation race entirely. The flock approach is rejected. The 'tail -f bwb.log' capture command in docs/MONITORING.md must be updated to a glob (e.g. 'tail -f ~/.local/state/bwb/bwb-*.log' or equivalent). Reproducer is still expected to confirm the rotation-race mechanism before/after the fix.
