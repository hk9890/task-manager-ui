id: q0zcnf55
author: Hans Kohlreiter
created: 2026-04-20T15:34:53Z
body: |-
  Finding: --no-auto-refresh AC risks gutting the FocusMsg handler. Why: model.go FocusMsg handling at line 247 likely does more than schedule a refresh (it is a generic focus regain hook); the AC 'disables scheduled/focus-regain auto-refresh' could be read as 'short-circuit FocusMsg entirely'. Suggested action: tighten AC to 'When --no-auto-refresh is set, the periodic tea.Tick at refreshTickInterval is not scheduled and the focus-regain branch suppresses the auto-refresh side effect only; non-refresh FocusMsg processing (if any) and manual user-triggered refresh keybindings remain unaffected.'
---
id: sdlfro6i
author: Hans Kohlreiter
created: 2026-04-20T15:34:57Z
body: |-
  Finding: Bundling --debug and --no-auto-refresh with --cwd is borderline-cohesive. Why: the three flags share zero implementation surface — --cwd touches main+services+gateway, --debug touches main+gateway runner, --no-auto-refresh touches only model.go. One PR will sprawl across packages with no internal cohesion, and a partial revert becomes painful. Not blocking but worth flagging. Suggested action: keep bundled if implementer estimates < ~150 LOC total; otherwise split --no-auto-refresh into a small follow-up task. Decide before claiming the task.
