id: b6m2bszl
author: Hans Kohlreiter
created: 2026-04-20T15:34:45Z
body: |-
  Finding: --cwd semantics are dangerously under-specified. Why: the instruction says 'use it as the effective project root / gateway working directory' but does not answer (a) does it os.Chdir or only thread an in-memory value, (b) is a relative --config resolved against the original cwd or --cwd, (c) what happens when --cwd does not exist or is not a directory, (d) does it affect launcher WorkDir interpolation. Each is a footgun. Suggested action: add Decisions to the task: '--cwd does NOT call os.Chdir; it sets projectRoot and RunnerConfig.WorkDir only. Relative --config is resolved against the process start cwd, not --cwd. A non-existent or non-directory --cwd exits non-zero before TUI startup. Launcher definitions inherit the resolved --cwd as their default WorkDir when none is specified.' Then mirror these as ACs.
