id: kl6w4454
author: Hans Kohlreiter
created: 2026-04-20T15:34:48Z
body: |-
  Finding: --debug output is unspecified, inviting improvisation. Why: 'lightweight stderr diagnostics for startup/CLI resolution and bd command execution summaries' is not a contract — implementer will pick fields, formats, and verbosity arbitrarily, and verifier cannot check. Suggested action: enumerate the diagnostics in the AC, e.g. 'When --debug is set, BWB emits to stderr: (1) resolved config path, (2) resolved --cwd, (3) auto-refresh enabled/disabled, (4) one line per bd invocation containing argv and exit code (no stdout/stderr capture). All --debug lines are prefixed with [bwb-debug] so they are greppable and distinguishable from config warnings.'
