body: |-
  Overlap with 8haw: 8haw criterion #4 ('Enter behavior for actionable metadata fields is consistent') is essentially a subset of this issue. What: if vvoe is implemented fully, 8haw's Enter-behavior criterion is satisfied. Why: implementing both independently risks conflicting fixes. Suggested action: implement vvoe first, then update 8haw to remove the Enter-behavior criterion and focus it purely on traversal order + Priority UX decision.
