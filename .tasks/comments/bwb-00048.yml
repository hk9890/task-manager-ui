body: |-
  Issue is well-scoped and ready to implement. What: acceptance criteria are clear and testable — Enter saves, Escape cancels. One gap: criteria don't specify behavior when Enter is pressed with no change (same value re-selected). Why: edge case matters because it determines whether a no-op save triggers a bd update call or silently closes. Suggested action: add criterion for no-change case (recommend: close dialog silently without issuing update).
