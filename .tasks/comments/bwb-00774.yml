body: |-
  Keybinding conflict not addressed. What: detail context currently binds j/down to scroll_down and k/up to scroll_up (config/keybindings.go:144-145). Task says up/down should select rail rows when rail is focused, but up/down already mean scroll. The task says 'preserve current content scrolling behavior when the content pane is focused' but does not specify how the same keys dispatch differently per focused pane. Why: a tasker must design the focus-aware key dispatch from scratch since the current HandleKey in mode/details/model.go has no concept of pane focus. This is a design decision disguised as an implementation task. Suggested action: add explicit instructions for how pane focus changes key dispatch — either (a) new detail actions like rail_move_up/rail_move_down that share the same default bindings but dispatch based on focus state, or (b) reuse existing scroll_up/scroll_down with focus-conditional behavior documented in the task.
