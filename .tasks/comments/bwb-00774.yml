id: gsrosg0h
author: Hans Kohlreiter
created: 2026-04-12T10:59:07Z
body: |-
  Enter key conflict with shell-level issue actions. What: task says Enter opens a selected related issue from the rail. But the app model (internal/app/model.go) handles key dispatch at the shell level before mode-specific handling. If Enter is already consumed by the shell for other actions in detail mode, the rail's Enter will never fire. Why: the task's files-to-modify list includes app/model.go which suggests the author is aware of shell-level dispatch, but the instructions don't describe how Enter dispatch precedence works when the rail is focused vs when it is not. Suggested action: add an instruction that rail Enter is dispatched as a mode-level intent (a tea.Cmd or custom message) from mode/details back to the app, not as a direct key match in app/model.go.
