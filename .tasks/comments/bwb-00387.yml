id: opqw90mf
author: Hans Kohlreiter
created: 2026-04-20T15:10:00Z
body: |-
  Git history review: I could not find a committed regression where the Dependencies header changed from 3 to 6. `countDependencyReferences` was introduced in 6cfbd30 (`feat: rework issue detail dependencies layout and metadata actions`) and has always counted only blocked-by + blocks + related. The closest real fix is abf5977 (`fix: stabilize detail metadata interactions and verification tooling`), which added de-duplication in `dependencyGroups` so duplicate issue IDs do not render across visible groups. `dcc7873` introduced the original wide rail; `6cfbd30` added the Dependencies pane + Structure group; `abf5977` is the commit that most plausibly fixed the underlying duplication symptom. A literal header-count=6 regression does not appear in committed history, so the issue may have been filed from a transient local state or from interpreting Structure rows as dependency rows.
