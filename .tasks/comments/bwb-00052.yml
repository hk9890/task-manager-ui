created: 2026-04-18T21:50:31Z
body: |-
  Missing acceptance criterion. What: no criterion explicitly states that dependents with dependency_type relates-to must NOT appear in Blocks. Why: a tasker could fix the Related rendering without removing the duplicate from Blocks, leaving the bug half-fixed. Suggested action: add criterion: 'An issue whose dependents include a relates-to entry must show that entry only under Related, not under Blocks.'
