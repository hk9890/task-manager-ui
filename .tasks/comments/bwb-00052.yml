author: Hans Kohlreiter
created: 2026-04-18T21:50:27Z
body: |-
  Root cause confirmed at read_gateway.go:152. What: referencesFromPayload(primary.Dependents) dumps all dependents into Blocks without checking dependency_type. The x2u fix added relates-to filtering only on the dependencies side (line 543), not the dependents side. A bd dep relate A B produces relates-to entries in both A.dependencies and B.dependents — the dependencies side now correctly routes to Related, but the dependents side still falls through to Blocks. Why: this means every relates-to link appears under both Related AND Blocks, which is the exact symptom described. Suggested action: replace referencesFromPayload for dependents with a type-aware function (like dependencyReferencesFromPayload but for the dependent direction) that routes relates-to dependents to Related and parent-child dependents to nowhere (they are handled by parent-group). This is the mirror of the x2u fix.
