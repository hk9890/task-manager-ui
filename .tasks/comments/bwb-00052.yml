body: |-
  Ordering relative to 74r/6eq. What: 6sk is a functional correctness bug in the gateway layer (read_gateway.go). 74r/6eq are cosmetic layout bugs in details.go. Why: 6sk changes what data flows into Blocks vs Related, which affects row counts in the Dependencies pane. If 74r width tuning is done first, the visible result will shift when 6sk removes phantom Blocks entries. No code conflict — 6sk touches read_gateway.go, 74r/6eq touch details.go — but visual verification would need redoing. Suggested action: fix 6sk before 74r/6eq. 6sk and yxjx are independent (gateway vs UI) and can run in parallel.
