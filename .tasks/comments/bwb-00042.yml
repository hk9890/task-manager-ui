id: b53fz0qn
author: Hans Kohlreiter
created: 2026-04-20T12:51:14Z
body: |-
  Review: Known-risks framing is too soft. What: epic lists 72vc and yumi under 'Known Risks' with 'check during readiness; if reproduces, treat as blocker'. Both bugs are currently OPEN and document concrete failures in 'go test ./...' which IS the authoritative quality gate per docs/CODING.md. Why: the readiness gate cannot pass while go test ./... fails, so these are not conditional risks — they are hard blockers today. Suggested action: either (a) add explicit blocks-by dependencies from yixr.1 to 72vc and yumi, or (b) require a written waiver decision recorded on the epic before yixr.1 can close.
