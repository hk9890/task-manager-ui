  Instruction #5 (consolidate catalog option types) and #6 (typed keybinding context) are marked 'optional' and 'discuss first'. These weaken the task's acceptance criteria — a tasker could skip both and still pass. Why: optional items in a chore task create ambiguity about 'done.' If they're not worth doing, remove them from the task. If they are, make them non-optional. Suggested action: either commit to these items or remove them. If keeping them optional, add explicit criteria like 'items #5 and #6 are optional; if skipped, add a comment explaining why.'
