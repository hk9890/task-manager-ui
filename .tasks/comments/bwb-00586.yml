id: eskl68wh
author: Hans Kohlreiter
created: 2026-04-12T11:12:57Z
body: |-
  Review question — dependency on wz9.1 may be over-constrained. What: wz9.2 depends on wz9.1. The selection unification (removing syncSelectionFromControllers polling) could technically be done before or independently of flattening mode.Controller storage. The polling code type-asserts through mode.Controller, yes, but removing the polling path and keeping only SelectionChangedMsg does not require the Controller interface to be gone first. Why: if the dependency is hard, these two tasks are serial and the critical path is longer. If the dependency could be relaxed, a tasker could work on wz9.2 in parallel with wz9.1 (or even first). Suggested action: consider whether the dependency should be 'soft' (recommended ordering) rather than 'hard' (blocks). If wz9.1 lands first the cleanup is cleaner, but wz9.2 is independently viable.
