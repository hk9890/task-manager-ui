id: kd4pq4kf
author: Hans Kohlreiter
created: 2026-04-12T11:12:45Z
body: |-
  Review finding — acceptance criterion is testable but the 'which mechanism wins' decision is unspecified. What: the instructions say 'pick a single selection sync mechanism' but do not state which one the tasker should pick. The two mechanisms are: (A) SelectionChangedMsg emitted by board/search after state changes, handled at model.go line 302; (B) syncSelectionFromControllers() polling via type-asserted CurrentSelection() at model.go line 159/483. Why: this is a design decision that materially affects how board/search communicate with the shell. If the tasker picks the wrong one, they either add coupling or break the Bubble Tea message-passing pattern. The message-based approach (A) is clearly better because it follows Bubble Tea conventions and eliminates the type assertion polling code. Suggested action: state in instructions that the message-based path (SelectionChangedMsg) should be kept and the polling path (syncSelectionFromControllers) should be removed. This removes ambiguity without adding scope.
