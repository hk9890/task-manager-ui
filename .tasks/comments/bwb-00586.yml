created: 2026-04-12T11:12:51Z
body: |-
  Review finding — extraction scope is vague. What: instruction 2 says 'extract focused helpers or files inside internal/app for selection and detail coordination and for shell owned action flows where that meaningfully shrinks model.go'. No concrete split point or target file count is given. Why: a tasker could extract anything from nothing to ten files. This is the kind of instruction that leads to over-engineering or analysis paralysis. The real goal is: keep model.go's Update function readable after removing the dual sync. Suggested action: tighten to something like 'extract detail coordination (ensureDetailForCurrentSelectionCmd and related helpers) into a focused file if it meaningfully reduces model.go line count; do not create new packages or new abstractions.'
