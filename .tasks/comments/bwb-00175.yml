body: |-
  Accepted reviewer follow-up: comments remain part of the center/content pane for this pass; implement height-aware dense layout, explicit overflow behavior, and a 3-pane focus model. Dependency rows reuse shared issue rendering visually but direct dependency-row navigation is out of scope for this pass unless trivially free.
