body: |-
  Review: Root cause confirmed — single-line fix. What: read_gateway.go:543 checks dependencyType == "related" but bd dep relate produces dependency_type "relates-to". The condition needs to also match "relates-to". Why: this is a data contract mismatch between bd CLI output and gateway parsing. Every relates-to link falls through to blockedBy (line 557). Suggested action: change line 543 to 'if dependencyType == "related" || dependencyType == "relates-to"'. Add a test case with dependency_type "relates-to" in read_gateway_test.go.
