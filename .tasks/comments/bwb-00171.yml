body: |-
  Review: Bug is well-scoped and actionable. One minor wording improvement. What: the repro steps say 'run bd create --id bwf-6 ... and bd dep relate bwf-2 bwf-6' but the acceptance criteria don't explicitly state the gateway must handle both 'related' and 'relates-to' dependency types. Why: a tasker might fix only 'relates-to' and break the existing 'related' path, or vice versa. Suggested action: add acceptance criterion: 'dependencyReferencesFromPayload classifies both dependency_type "related" and "relates-to" as related work, verified by unit tests for each.'
