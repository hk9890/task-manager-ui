  Correction to my previous SharedUIState concern: verified that services.UI (SharedUIState) is indeed never read — its only field ToastMessage appears only in the struct definition. The '.UI.' references in model.go are services.Config.UI (the config model), not services.UI (SharedUIState). The deletion is safe. No action needed on this point.
