body: |-
  Inaccurate instruction #11: task says 'Delete BottomLeft() and Top() functions' but they are Position constants (iota values), not functions. The actual dead code is the BottomLeft and Top enum values plus their case branches in calculatePosition(). Why: a tasker following these instructions literally will look for functions that don't exist and get confused. Suggested action: reword to 'Remove unused BottomLeft and Top position constants from the iota block and their corresponding case branches in calculatePosition.'
