body: |-
  Missing AC — cleanup guarantee. What: No acceptance criterion requires that the PTY child process is always killed even if the script crashes or times out. Why: Orphaned bwb processes will confuse subsequent runs and potentially hold locks on the beads DB. The existing script has basic cleanup but extending it with wait loops increases the risk of edge cases. Suggested action: Add AC requiring that the child process is guaranteed killed on any exit path (timeout, crash, keyboard interrupt). Test this explicitly.
