body: |-
  Minimum viable capabilities — prioritize wait-for-text over checkpoints. What: The description mentions optionally add companion script for before/after bd show --json checks. That is useful but secondary. The primary value-add over the current script is wait-for-text between steps so multi-step flows are reliable. Why: Without wait-for-text, the tool is just the current script with more steps — still timing-dependent, still flaky. With wait-for-text alone, you get reliable multi-step flows even without state snapshots. Suggested action: Priority order should be (1) wait-for-text/wait-for-no-text in step syntax, (2) intermediate screen capture/checkpoint, (3) before/after state wrapper. Item 1 is the MVP. Items 2-3 are nice-to-have.
