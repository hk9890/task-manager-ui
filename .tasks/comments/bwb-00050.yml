  Coupling note: 4k8p and 3ymu are independent. 4k8p is purely rendering (metadata.go + details.go renderMetadataPaneLines). 3ymu is purely navigation model (model.go syncBrowserPanel/browserItemsFromDependencies). No shared code paths. Recommended order: fix 3ymu first — it's a functional navigation bug (users cannot reach items). Then 4k8p — it's cosmetic polish. Both are small (< 30 lines changed each).
