body: |-
  Manual residual addressed via project-sanctioned PTY verification (docs/RUNTIME_UI_VERIFICATION.md §2 'Ad-hoc PTY recipes' — 'agent-visible proof of runtime behavior without manually watching a terminal'). Driven with scripts/capture_bwb_screen.py under pyte (real PTY, raw-mode):
  - repo = embedded seed fixture (bwf-1..5)
  - EDITOR = /tmp/bwb-fake-editor (executable Python script that rewrites the BWB:FIELD:TITLE content to 'PTY VERIFIED EDIT' and exits 0)
  - steps: wait-for-text:Ready → wait-for-text:Selected: → send-key:e → wait-for-text:'Updated issue':8000 → send-key:CTRL+Q
  Result: overall_ok=true, failure=null, every step matched. bd list afterwards shows bwf-2's title changed to 'PTY VERIFIED EDIT' (other three issues unchanged). This proves end-to-end: 'e' keypress → prepareEditCmd → tea.Exec released the raw-mode TTY → external editor subprocess took it and modified the temp file → tea.Exec restored the TTY → ApplyEdits parsed and called UpdateIssue → success toast rendered cleanly in the next frame (otherwise wait-for-text would have timed out on garbled output). All five acceptance criteria are now met.
