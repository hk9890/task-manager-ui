body: "## Exploration wrap-up — 2026-05-27 (scope: UI / data correctness)\n\n### Actions tried (20 iterations)\n\nBuilt /tmp/bwb-explore and seeded a scratch repo via embeddedfixture/setup.sh. Read-only checks against this project's own .beads/ DB for the >50-closed-issue path. Mutating actions targeted the scratch repo only.\n\n1. Baseline counts (Not Ready / Ready / In Progress / Done) on seed fixture vs `bd count` — match.\n2. Cold-start board after out-of-band `bd close bwf-1` — Ready 2→1, Done 1→2; columns reflect new state on launch.\n3. Manual `r` refresh while bwb running, with out-of-band close mid-flight — board updates correctly, status returns to Idle.\n4. Detail-vs-`bd show` parity for bwf-2 (assignee/labels/comments/deps/timestamps).\n5. Detail for bwf-5 (stored-blocked, no dependency) — appears in Not Ready; Counts shows 'Blocked by: 0'.\n6. Empty `bd init` repo — all four columns 0, '(no issues)' placeholder, no crash.\n7. Search count parity for 'fixture' — 1 result, matches `bd search`. Confirmed search entry is ctrl+space, not '/'.\n8. Search 'seed' returns 0 — verified upstream bd tokenization, not a bwb bug.\n9. Done column sort order — ClosedAt DESC (bwf-1 closed 22:23 above bwf-3 closed 21:54).\n10. Done 'N of M' format on real repo (35 of 736) — found that the 50-row floor described in RUNTIME_UI_VERIFICATION.md §5 has been removed (by afwe); runbook is stale.\n11. Hammer `r` rapidly (10 presses) — Done count stable, status returns to Idle. ule7 guard holds.\n12. Detail scroll reset on selection change — switching from bwf-1 to bwf-4 starts at top.\n13. Backend parity: `--repo beads` vs `--repo caching` on the same scratch DB render identical boards.\n14. In-app close of bwf-4 via `x` + modal y — board updates Ready 2→1, Done 1→2; bd state persisted.\n15. `c` create modal opens with prefilled placeholders and label catalog.\n16. `?` help modal — renders cleanly within viewport (znri.5 fix holds).\n17. `u` update modal — pre-fills with current values. Minor format: 'P1' in detail vs '1' in modal (intentional).\n18. Long-title (138 chars) + emoji issues render with truncation; borders intact.\n19. Emoji + CJK + RTL chars (\U0001F680 café résumé 测试 ﷽) in detail view — render cleanly.\n20. Assignee fallback: explicit `assignee=alice` is shown verbatim; xxd.4 'prefer assignee, fall back to owner' precedence holds.\n\n### Tasks filed\n\n- beads-workbench-b38b.2 (bug, P2): Detail Metadata pane labels owner email as 'Creator'; ignores bd's `created_by` display name. UI/data consistency.\n- beads-workbench-b38b.3 (bug, P2): RUNTIME_UI_VERIFICATION.md §5 documents a removed 50-row floor; procedure can no longer pass as written. Doc drift after afwe.\n\n### Coverage and limits\n\n- Verified: dashboard counts, refresh (cold-start + in-flight `r`), in-app close + persist, detail-vs-bd-show parity, comment newest-first ordering, sort order (Done = ClosedAt DESC), backend parity, empty-state, long/emoji input, modal rendering (close, create, update, help).\n- NOT explored:\n  - Runtime resize-then-`r` flow: capture_bwb_screen.py has no SIGWINCH/resize step, so iwvm's runtime resize procedure could not be exercised in-process here.\n  - Editor handoff (`e`): skipped to avoid spawning real editor; covered by existing teatest fixtures.\n  - Launcher actions (`n`/`p`/`l`): not exercised — would launch real subprocesses.\n  - Concurrent ctrl+R + out-of-band mutation interleaving: only single-shot in-flight + 10-press hammer; not contested concurrency.\n  - Caching backend persistence across restart: didn't test JSONL hydrate path on a second bwb invocation.\n  - Search reload `r`-while-typing race: only happy-path search submit tested.\n  - Auto-refresh on focus regain / low-frequency background: documented but not exercised.\n  - Scale fixture (590 issues): skipped — setup.sh-via-bd is ~10 minutes; used live project DB for high-cardinality probe instead.\n\nBoth filed tasks remain open for normal triage."
