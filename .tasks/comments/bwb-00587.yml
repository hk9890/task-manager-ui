id: 6etru2r5
author: Hans Kohlreiter
created: 2026-04-11T13:17:05Z
body: |-
  Scroll cache invalidation concern. What: mode/details/model.go uses a content-based cache (cacheMatchesCurrentState with reflect.DeepEqual) to avoid re-rendering for scroll calculations. After markdown rendering, the same IssueDetail will produce different rendered output if the renderer is width-dependent or style-dependent. Why: the cache key is the raw domain data, not the rendered output. If glamour rendering introduces non-determinism (e.g., different terminal color capabilities) or if the width/style changes, the cached line count will be stale and scrolling will break. Suggested action: verify that the line-count cache invalidation still works correctly after markdown integration, and consider whether the cache key needs to include a renderer version or style hash.
