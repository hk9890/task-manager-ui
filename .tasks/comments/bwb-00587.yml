body: |-
  Missing: comments rendering under markdown. What: instruction #3 says 'Keep comments and metadata readable even if they stay plain text for now' but this is ambiguous about whether comment bodies should also get markdown rendering. Comment bodies in beads often contain markdown-formatted text. Why: if comments are excluded from markdown rendering in spi.2 but included later, that is a separate task not tracked anywhere. If they should be included, the acceptance criteria need to cover it. Suggested action: make an explicit decision — either add 'comment bodies also render as markdown' to spi.2 scope, or create a follow-up task for it.
