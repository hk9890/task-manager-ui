body: |-
  Missing scope: compact detail path in search preview will also render markdown. What: spi.2 lists files to modify including details.go and mode/details/model.go, but the search preview at internal/ui/search/search.go lines 174-201 calls uidetails.Render with Compact: true. If markdown rendering changes the output of Render(), search preview changes implicitly. Why: the implementer needs to know that search preview is a consumer of the compact detail path and must verify its appearance after markdown integration. Suggested action: add a note in spi.2 instructions that search preview uses compact detail rendering and must be visually verified, or add internal/ui/search/search_test.go to the files-to-modify list.
