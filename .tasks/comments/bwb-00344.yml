body: |-
  Cross-mode inconsistency reinforcing this finding: search mode labels a truncated result list '25 capped' (explicit word), while the board Done column uses '75+'. The search-mode wording is unambiguous; the board '+' is not. Whatever fix is chosen for the Done badge, aligning it with search mode's 'capped'/'N of M' phrasing would also fix a board-vs-search consistency gap.
