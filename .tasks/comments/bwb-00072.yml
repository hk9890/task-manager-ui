  Plan simplification recommendation: merge task 2 into task 1. Task 2 (chrome styling) cannot meaningfully exist as a separate task from task 1 (header restructuring). The current code already applies tab styling — task 1 must make styling decisions to render a working one-line header. Task 2 as a P2 polish pass after task 1 will either find the work already done or create churn re-styling what task 1 just built. Merging them keeps the epic at 3 beads (structural header+footer+styling, board coloring, acceptance) instead of 4. The implementation is small enough to be one task.
