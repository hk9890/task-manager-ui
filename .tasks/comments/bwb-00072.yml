body: |-
  Hidden risk: the UI.ShowModeSwitcherHelp config flag (model.go:600-601) gates the current help lines. Task 1 moves help to the footer, but this config flag check still applies. If this flag is false, the user gets no help at all — neither header nor footer. The plan does not address this. Suggested action: task 1 instructions should state that the footer help is always shown (remove the config gate) or that ShowModeSwitcherHelp now controls footer visibility instead. The config field name may need updating too.
