body: |-
  Review finding — scope boundary is correct but tight. What: epic comment says cmd/bwb, internal/config, internal/launcher, internal/ui should stay stable. This is true today but wz9.1 will change the mode.Controller interface which board/model.go and search/model.go both implement (var _ mode.Controller = (*Model)(nil)). The board also imports dashboard and gateway packages. Why: the file lists on child tasks already cover these, so no scope hole here. Just flagging that the epic comment slightly understates the blast radius — wz9.1 touches mode/board and mode/search, not just app and mode/contracts. Suggested action: none, child tasks already capture this correctly.
