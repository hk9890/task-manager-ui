id: 4segogzy
author: Hans Kohlreiter
created: 2026-04-12T11:14:33Z
body: |-
  Review finding — simplification opportunity: could wz9.1 and wz9.2 be one task? What: wz9.1 removes mode.Controller storage and type assertions. wz9.2 removes the dual selection sync that relied on those type assertions. After wz9.1, the polling-based syncSelectionFromControllers cannot exist in its current form (the type assertion through mode.Controller is gone). So wz9.2's primary target is partially destroyed by wz9.1. Why: splitting closely coupled work into two tasks creates a false checkpoint — wz9.1 cannot be 'done' without also addressing the selection sync path that depends on the removed interface. A tasker completing wz9.1 would need to either break the polling path or convert it, which is wz9.2's job. Suggested action: consider merging wz9.1 and wz9.2 into one task. The combined scope is still manageable (one file cluster, one conceptual change: 'flatten shell ownership and pick one selection sync mechanism'). If you want to keep them separate for review granularity, explicitly document that wz9.1 may leave syncSelectionFromControllers in a temporarily broken/stubbed state until wz9.2 lands.
---
