author: Hans Kohlreiter
created: 2026-04-12T11:12:08Z
body: |-
  Review finding — dual selection sync is real and clearly visible. What: model.go lines 159-161 show syncSelectionFromControllers() polling via type assertion (lines 489-515), AND lines 302-310 handle SelectionChangedMsg from controllers. These are two independent sync paths for the same state. Both board and search emit SelectionChangedMsg AND expose CurrentSelection() via type-asserted interface. Why: wz9.2 is correctly scoped to address this — confirmed the problem is not hypothetical. No action needed on epic.
