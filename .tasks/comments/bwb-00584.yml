body: |-
  The current left rail is a renderer column, not a panel component — the task understates the refactor scope. What: The instructions say 'Redesign dedicated detail presentation so the left side is treated as a browser panel' but the current left rail exists only as a column inside ui/details/details.go's renderThreeColumn(), with rendering logic (renderRelatedIssuesRail) inline in the same file. There is no separate panel component to promote. The current 'left rail' also only shows related issues for the currently viewed issue — it does not show arbitrary browsable issues. Why: A tasker reading 'promote left related-issues widget' may think there is an existing selectable widget to extract. In reality, the left column is a stateless render function and the browsing state (SelectedRelatedIndex, focus pane, Enter-to-navigate) lives in mode/details/model.go. The refactor needs to: (a) create a new panel component, (b) move selection state into it, (c) wire it as a shell-level panel rather than a detail-renderer column. This is a new component, not a promotion. Suggested action: Reframe the instructions to acknowledge this is building a new left browser panel component, not extracting an existing one. Specify whether the left panel content is 'related issues for the selected issue' (current behavior) or 'all issues from the browse mode that led here' (a fundamentally different data source).
