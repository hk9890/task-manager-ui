id: dg7qj0qr
author: Hans Kohlreiter
created: 2026-04-12T14:06:30Z
body: |-
  Missing data source decision: what populates the left browser panel? What: The user says 'Enter on an issue in the left browser should update adjacent details, similar to browsing issues in the dashboard.' This implies the left panel shows a list of issues the user can browse through — but from where? Options: (a) related issues of the currently-viewed issue (current behavior), (b) the list from the board/search mode that spawned detail, or (c) a new independent query. These have very different implementation shapes. Why: Option (a) is close to what exists but limits navigation to the issue graph. Option (b) requires the shell to pass the browse-mode's issue list into detail, which is a new data flow. Option (c) requires a gateway query. The task cannot be executed without this decision. Suggested action: This should be resolved as part of .4's contract definition. The user's language ('similar to browsing issues in the dashboard') suggests option (b) — the same issue list from board/search becomes the left panel in detail. Confirm or reject this interpretation before unblocking .2.
