id: p51fibp4
author: Hans Kohlreiter
created: 2026-05-24T17:42:51Z
body: |-
  ## Root-cause analysis (post-filing)

  ### Where the bug lives тАФ NOT the repository layer

  **Repository is correct.** `repository.Search(ctx, query)` in `internal/repository/beads/lean_reads.go` correctly:
  - routes empty-text тЖТ `bd list --all`, text-only тЖТ `bd search <text> --status all`, etc. (per the routing table documented in `internal/mode/search/parity/search_parity_integration_test.go:11-21`),
  - returns `Completeness=Exact` when `Limit==0 || len(results) < Limit` (kb8e.15 fix at `lean_reads.go:540-542`),
  - matches `bd <verb>` output on both the embedded fixture and this repo's real .beads/ тАФ `TestSearchParityFixture` and `TestSearchParityThisRepo` (the latter under `BWB_PARITY_THIS_REPO=1`) both pass.

  ### The bug lives in `internal/mode/search/model.go` тАФ three pieces conspire

  **(1) `Init()` (line 101)** fires an empty-text search on entering search mode:
  ```go
  return loadSearchCmd(m.repo, domain.SearchIssuesQuery{Limit: m.searchItemCapacity(), Offset: 0})
  ```
  Empty text тЖТ repository routes to `bd list --all` тЖТ returns every issue including closed. That's intentional at the repo layer; it becomes harmful when it lingers as the visible result set under a user-typed draft.

  **(2) `triggerSearchWithAnchor()` (line 313-322)** has a silent re-entry guard:
  ```go
  if m.loading {
      m.logger.Debug("triggerSearchWithAnchor re-entry suppressed; search already in flight", "query", queryText)
      return nil   // <-- Enter is swallowed; the user gets no feedback
  }
  ```
  The comment claims this is "defense in depth" because `Reload()` is the primary guard (line 397). But the same path is reached by explicit user-Enter at line 186-187 (`tea.KeyEnter && m.focus == uisearch.FocusQuery тЖТ triggerSearch()`) тАФ when the user presses Enter, the guard treats them as a re-entrant caller and silently discards the keystroke.

  **(3) Race window:** the user types `t`,`a`,`s`,`k`,ENTER in <500 ms after opening search mode. Meanwhile the Init() empty-text load is still in flight (bd subprocess latency). Every Enter that arrives during that load hits the guard, returns nil, and disappears. When Init eventually resolves, `m.loading=false` and `appliedQuery=""` тАФ but the typed draft is never re-applied, no further trigger fires. The user sees:
  - the auto-init's `bd list --all` results (5 rows including closed bwf-3 in fixture; the full-DB list on real repos),
  - the `draft` badge (because `draft="task" != appliedQuery=""`),
  - the "Results below are stale. Press Enter to search тАж" overlay тАФ which is now actively misleading: Enter still does nothing new because, in normal cases, the user is no longer typing fast enough to race, but the badge calculation `hasDraftChanges(state)` (`internal/ui/search/search.go:390`) keeps flagging it.

  ### Why no existing test catches this

  `internal/mode/search/model_test.go` uses the `pressAndResolve(m, тАж)` helper at line 602, which delegates to `testui.ApplyControllerKeySequence`. That helper **drains every command synchronously** before sending the next message. So in the unit tests, by the time the next key arrives, `m.loading` is always `false` тАФ the race cannot occur. The repository-layer parity tests bypass the controller entirely and call `repo.Search(query)` directly.

  There is no test in the repo that simulates the live `tea.Program` cmd cadence with overlapping async commands. The bug class тАФ controller key handling vs. in-flight async commands тАФ is unreachable by the existing harness.

  ### Direction (sketch тАФ implementer's call)

  Three options, listed lowest-risk first:

  1. **Drop the re-entry guard for the user-Enter path** and rely on the existing `Reload()` call-site guard. The comment at line 314 says the guard exists "for future callers that may not check m.loading at the call site"; the explicit user-Enter handler is a known, intentional caller тАФ defend it differently.
  2. **Queue the pending submit.** When Enter arrives while loading, record `pendingDraft = draft`; in the `searchLoadedMsg` handler, if `pendingDraft != "" && pendingDraft != appliedQuery`, re-fire `triggerSearchWithAnchor(pendingDraft, nil)`.
  3. **Show feedback in the View.** If Enter is intentionally dropped, render something like "queued тАФ waiting for current search to finish" so the user knows their key was not lost.

  Option (2) is probably what users expect; option (3) is the cheapest fix if (2) is judged risky.

  ### Test gap (filed separately)

  A controller-level async contract test is needed to lock this behavior in. Spec'd in a sibling task тАФ see the new task filed alongside this comment.
