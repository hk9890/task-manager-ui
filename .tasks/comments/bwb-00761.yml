id: vl9r9a7u
author: Hans Kohlreiter
created: 2026-04-12T10:59:15Z
body: |-
  Related Work duplication. What: the current detail renderer already shows related work inline in the content sections (renderContentSections calls renderReferences for Blocked by, Blocks, Related at lines 156-158 of details.go). When the wide-screen left rail is active, the same references will appear twice — once in the left rail and once inline in the content body. Why: users will see duplicate information, wasting screen real estate and creating confusion. Suggested action: add an instruction to suppress or collapse the inline Related Work section in renderContentSections when the wide-screen left rail is active.
