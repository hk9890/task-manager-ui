id: rg7tzhxe
author: Hans Kohlreiter
created: 2026-04-12T11:13:46Z
body: |-
  Review finding — missing dependency on wz9.3 may create a consistency gap. What: wz9.4 does not depend on wz9.3, but the dashboard Query struct (definition.go line 37-45) maps directly to gateway query types. If wz9.3 changes the gateway query types or adds new ones (e.g., search-based sections), the dashboard contract should reflect that. Why: in practice this is probably fine because wz9.3 only changes internal decoding, not the BeadsGateway interface (acceptance criterion: 'BeadsGateway interface remains unchanged'). But if wz9.3 accidentally surfaces new query capabilities, wz9.4 would need to know. Suggested action: no hard dependency needed — the BeadsGateway interface stability guarantee in wz9.3 makes this safe. Just noting for awareness.
