id: 7iqyes1s
author: Hans Kohlreiter
created: 2026-04-12T11:13:41Z
body: |-
  Review finding — 'validation' scope is vague without concrete invalid states. What: instructions say 'add validation or contract helpers defining minimum valid dashboard/section shape' and 'add tests for empty, invalid, and valid multi-dashboard provider outputs'. But the task does not enumerate what invalid means. Why: the tasker will have to invent the invalid cases. Looking at definition.go, the concrete failure modes are: (1) Definition with empty ID or Title, (2) Section with empty ID/Title, (3) Section with Query.Type that does not match any populated query payload, (4) Section with unsupported QueryType, (5) Definition with zero sections, (6) Provider returning zero definitions. Some of these already fail implicitly in runSectionQuery (line 388 in board/model.go: 'unsupported dashboard query type'). Suggested action: enumerate the invalid states in the instructions so the tasker builds the right validation and the right tests.
