id: 99dtz7uo
author: Hans Kohlreiter
created: 2026-04-12T11:13:53Z
body: |-
  Review question — where does validation execute? What: the instructions say to add validation helpers and have board/model.go consume validated definitions. But it is not clear whether validation should happen (A) inside the Provider itself (Validate on return), (B) in a separate Validate() function called by the board before use, or (C) in the board loader when it receives definitions. Why: this affects error reporting and the contract boundary. If the provider validates, a file-backed provider must also validate — good, but couples Provider to validation rules. If the board validates, each consumer re-validates — redundant. Option B is cleanest: provider returns, board calls Validate(defs) before use. Suggested action: specify in instructions that validation should be a standalone function in internal/dashboard (not on Provider, not in board) so both built-in and future file-backed providers get the same gate.
