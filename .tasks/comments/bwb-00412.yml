id: oczvxjkh
author: Hans Kohlreiter
created: 2026-04-08T10:59:40Z
body: |-
  AC says 'selected rows remain readable' but does not define selected-row styling. What: the current selected row uses '› ' prefix (board.go:204-206) with no color treatment. The donor uses a SelectionIndicatorStyle (bold white '>') and a SelectionBackgroundColor for the entire row. The task says 'improve selected-row emphasis' but does not say how. Why: the tasker may add a background highlight, change the prefix character, make the row bold, or do nothing — all are valid interpretations. Suggested action: specify selected-row treatment explicitly: e.g., bold white '›' prefix (matching donor's SelectionIndicatorStyle), no background fill, or add a subtle background highlight. Pick one.
