id: 2ybpald6
author: Hans Kohlreiter
created: 2026-04-08T10:59:27Z
body: |-
  Golden file testing will be harder with ANSI color codes. What: the current board_test.go uses assertGoldenNormalized which strips trailing whitespace but does NOT strip ANSI escape codes. Adding colors to renderRowLine means golden files will contain ANSI sequences, making them hard to read and maintain. Why: the existing golden comparison approach will produce unreadable golden files when colors are added. The tasker needs guidance on whether to (a) update goldens to include ANSI codes, (b) add an ANSI-stripping normalizer, or (c) test coloring separately from layout. Suggested action: add a note to instructions that board golden tests should strip ANSI codes before comparison (update the normalizer), and add separate assertions for color presence if needed.
---
