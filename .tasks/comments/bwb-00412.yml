id: 07iigtbq
author: Hans Kohlreiter
created: 2026-04-08T10:59:14Z
body: |-
  Scope creep risk: 'introduce shared helpers or a dedicated UI helper' is vague enough to over-engineer. What: instruction #2 says to introduce a shared helper or dedicated issuebadge package. The donor's issuebadge package (perles/internal/ui/shared/issuebadge) is 140 lines with Config struct, readiness glyphs, pinned badges, and a RenderBadge + Render split. Importing this pattern wholesale would be over-engineered for BWB's current needs — BWB has exactly one call site (board.go:renderRowLine). Why: a tasker following the 'adapt donor patterns' instruction may build a full issuebadge package with Config, ShowSelection, ShowReadinessReason, etc., when BWB only needs colored type/priority/status tokens in renderRowLine. Suggested action: explicitly state that BWB does NOT need the full issuebadge package pattern. The goal is: (a) define color tokens for type/priority/status in styles/colors.go, (b) apply those colors in renderRowLine. No new package, no Config struct, no readiness glyphs. Keep the helper functions in renderhelpers/helpers.go and just make them return styled strings.
---
id: wxrh0hk5
author: Hans Kohlreiter
created: 2026-04-08T10:59:24Z
body: |-
  Missing specification: what colors map to what. What: the task says 'define BWB-owned issue type/priority/status colors' but does not specify what those colors are. The donor has ~30 color definitions for types, priorities, and statuses (perles styles.go:107-154). BWB currently has no issue-specific colors at all — only generic UI colors. Why: the tasker will either copy the donor's full color palette (including types BWB does not use, like Molecule, Convoy, Agent, Decision, Story, Milestone) or have to decide on a subset. Either way, they are making undocumented design decisions. Suggested action: specify the minimum color set needed: types = bug (red), task (blue), feature (green), epic (purple), chore (gray); priorities = P0 (red/bold), P1 (orange), P2 (yellow), P3+ (gray); statuses = open (green), in_progress (blue), blocked (red), closed (gray). This matches what BWB's renderhelpers already handles.
