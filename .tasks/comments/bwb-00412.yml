body: |-
  Task 3 has no dependency on tasks 1 or 2 — this is correct and good. The board coloring is independent of the header/footer changes. However, task 3 and task 1 both touch renderRowLine indirectly (task 1 changes footer and header but task 3 changes board rows). Since task 3 modifies board.go and task 1 modifies model.go, there should be no merge conflicts. This parallelism is well-structured.
