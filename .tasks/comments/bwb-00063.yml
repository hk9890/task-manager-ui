id: dhtafl7q
author: Hans Kohlreiter
created: 2026-04-11T12:32:13Z
body: |-
  Contradictory acceptance criteria. What: The description body has 5 concrete AC checkboxes about creating a CI workflow. The separate 'ACCEPTANCE CRITERIA' field says something completely different — it talks about 'recording the gap' and 'making a decision for future provenance' as if this were a discovery/decision task, not an implementation task. These two sets of AC point at different scopes of work. Why: An agent executing this will not know which AC to satisfy. The body says 'build the workflow,' the field says 'record a decision.' Suggested action: Align on one scope. If this is 'implement CI,' delete the decision-oriented AC field and keep the implementation checkboxes. If this is 'decide on CI strategy,' rewrite the body to match.
