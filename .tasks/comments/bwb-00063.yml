author: Hans Kohlreiter
created: 2026-04-11T12:38:01Z
body: |-
  Implemented CI provenance workflow: added .github/workflows/ci.yml (push + pull_request) using actions/setup-go with go-version-file=go.mod (go 1.24.2 policy), and running build/vet/test gates. Updated docs/RELEASING.md to reference the CI workflow as release provenance. Note: repo is currently private, so Actions minute usage should be monitored.
