id: dsgm9l4x
author: Hans Kohlreiter
created: 2026-04-11T12:32:07Z
body: |-
  Type mismatch: bug vs task. What: This is typed as 'bug' but it describes a missing capability (no CI workflow), not broken existing functionality. The repo never had CI, so nothing is regressed. Why: Bug type implies a defect to fix, which sets the wrong expectation for triaging and prioritization. Missing CI on a project that never had it is a task or chore, not a bug. Suggested action: Retype to 'task'.
