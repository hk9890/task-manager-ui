id: wcjr8w5e
author: Hans Kohlreiter
created: 2026-04-11T12:32:18Z
body: |-
  Missing dependency on private repo constraint. What: This issue says to add GitHub Actions CI, but beads-workbench-2rj flags that the repo is currently private. GitHub Actions minutes for private repos are limited (2000 min/mo on free plan). The issue does not acknowledge this constraint or ask whether CI should be added before the visibility decision. Why: An agent could add CI that silently burns through Actions minutes on a private repo, or the CI may behave differently once the repo goes public. Suggested action: Add a note acknowledging the private-repo Actions-minutes constraint, or add beads-workbench-2rj as a soft dependency (not blocking, but awareness).
---
id: zeg3p62k
author: Hans Kohlreiter
created: 2026-04-11T12:32:24Z
body: |-
  Go version not specified. What: The instructions say to create a CI workflow running go build/vet/test but do not specify which Go version to use. There is no go.mod-level Go version constraint mentioned either. Why: An agent will have to guess the Go version for the workflow matrix. Wrong version choice could cause CI to pass/fail differently than local. Suggested action: Check go.mod for the Go version directive and explicitly require the workflow to use that version.
