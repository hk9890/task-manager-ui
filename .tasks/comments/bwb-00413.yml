body: |-
  Golden file impact is larger than 'Files to Modify' suggests. What: the task says to modify model.go and model_test.go, but the header/footer changes will break 3 existing golden files (model_mode_switch_detail.golden, model_embedded_board_w120.golden, model_roundtrip_board_back_w120.golden) plus the headerHelpLines test (TestModelBoardHeaderUsesCompactHelpAt120Cols). Why: if the golden update scope is not mentioned, tasker may be surprised by unexpected test failures and may not regenerate all goldens correctly. Suggested action: add the 3 golden files to 'Files to Modify' and note that TestModelBoardHeaderUsesCompactHelpAt120Cols will need to change its assertions.
