id: 8uqnn5ib
author: Hans Kohlreiter
created: 2026-04-19T09:18:13Z
body: |-
  Board auto-refresh selectedRow map reset bug. What: In dashboardsLoadedMsg handler (line 135), selectedRow is unconditionally recreated as a new map with all values 0, even during refreshModeAuto. The anchor captures the old row, but restoreFromAnchor writes into the NEW map only for focusedColumn — other columns lose their selectedRow state. Why: If a user navigates to column 1 row 2, then triggers auto-refresh, after restore the other columns (0, 2, 3) will have selectedRow=0 which is correct (new map), BUT if the issue is found in a DIFFERENT column than the anchor's focusedColumn via findIssue, it writes selectedRow[col]=row for that column only — the original anchor.focusedColumn gets no explicit row write and defaults to 0. This is benign since focus moves to the found column, but it's worth noting the row memory for non-focused columns is always lost on auto-refresh. This is acceptable but differs from the AC wording 'preserve focused column AND selected issue' — it only preserves one column's row. Suggested action: Document this as intentional (preserving only focused column is fine for v1), or save per-column rows in anchor if you want stronger preservation later.
---
id: u8jp1bsh
author: Hans Kohlreiter
created: 2026-04-19T09:18:23Z
body: |-
  Board loading=true during auto-refresh blocks View rendering. What: AutoRefresh sets m.loading=true (line 281), which causes View() to render the loading spinner until all sections complete. Why: During auto-refresh, the user sees a flash of loading state instead of stale-but-usable content. This is non-destructive in that it doesn't lose state, but it IS visually disruptive — the user's board disappears momentarily during every tick/focus-regain refresh. A truly non-destructive refresh would keep rendering old data until new data arrives. Suggested action: Consider a 'refreshing' flag separate from 'loading' that still shows old content with a subtle indicator, or accept this flash as v1 behavior and document it.
---
id: klw2fmcq
author: Hans Kohlreiter
created: 2026-04-19T09:18:38Z
body: |-
  Search typing suppression is correct but has a subtle edge. What: The typing flag is set true on keypress and cleared on searchLoadedMsg receipt (line 83). AutoRefresh checks m.typing AND m.focus==FocusQuery. Why: If the user types a character, the search fires, and the response comes back (clearing typing=false) BEFORE the next tick, the tick will auto-refresh even though the user may still be mid-thought. The window between keystrokes where typing=false is a valid auto-refresh window. This is actually fine behavior — it means 'suppress only while a typed query is in-flight' not 'suppress while user is composing.' Suggested action: None needed — this is reasonable semantics. Just noting the behavior is 'in-flight suppression' not 'debounced typing window suppression.'
