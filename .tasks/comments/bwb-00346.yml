  Implemented. editor.Service split into PrepareDocument + ApplyEdits + BuildEditorCmd; monolithic EditIssue and Opener/ProcessOpener removed. model.go rewired to 3-phase flow: prepareEditCmd -> editIssuePreparedMsg -> tea.Exec(editorCmd) -> editorExitedMsg -> applyEditsCmd -> editIssueResultMsg (existing toast handler reused). ExecCommandFactory seam added to Services, defaulted in both NewServices and NewServicesWithLauncher. Temp file removed on success/no-change/editor-error paths. All 3 error paths (prepare fail, editor exit!=0, apply/parse fail) surface as toasts, none swallowed. doc.go + docs/CONFIGURATION.md updated. go build ./... green; 1082 tests pass -race; quality:fast clean. Note: model_test.go's editIssue test injects editorExitedMsg directly since tea.execMsg is unexported -- rig9 adds the full teatest-driven coverage.
