  EXPLORATION SUMMARY -- beads-workbench, 2026-05-22 (focus: keybindings)

  Actions tried (10 iterations):
  1. Keybinding validation via 'bwb --check-config' with crafted configs (invalid key name / unknown action / conflicting key).
  2. In-app help overlay ('?') vs documented f13-f16 mode keys, driven against the embedded fixture.
  3. Override merge edge cases: empty key list, post-merge cross-action conflict, within-list duplicate key.
  4. Search-mode query typing vs configured nav keybindings (code read of search/model.go handleKey).
  5. Cross-context key routing: rebinding shell create_issue onto board key 'j', verified double-fire at runtime.
  6. Rebound toggle_help open vs close, verified at runtime (open with 't', close only with hardcoded '?').
  7. Modal-context keymap + hardcoded y/n (code read of ui/modal/modal.go).
  8. Board footer + help overlay text -- confirmed config-derived, not hardcoded.
  9. search CapturesShellKey / shellKeysPassThrough dead-entry analysis.
  10. Detail-mode keybinding round-trip (3 / j / r / esc) confirmed at runtime.

  Tasks filed (all children of this epic):
  - aci5.2 (bug) -- Keybinding validation does not 'fail startup' for invalid key names / unknown actions as docs claim; invalid key name loads as 'config OK' with no warning and silently bricks the binding.
  - aci5.3 (bug) -- Default mode-switch keys f13-f16 are unreachable/undiscoverable; mode_cycle has no usable default binding; in-app help omits them entirely.
  - aci5.4 (bug) -- Confusing keybinding error when a key is duplicated within one action's own list ('conflicts between move_down and move_down').
  - aci5.5 (bug) -- Cross-context key collision double-fires: a board/search key also triggers an unguarded shell action; '--check-config' gives a false 'config OK'.
  - aci5.6 (bug) -- Rebound toggle_help only opens the help overlay; closing is hardcoded to '?'; help text also mislabels the rebound key as a toggle.
  - aci5.7 (question) -- ShellActionHelp/ModeDetail in search shellKeysPassThrough are dead entries for rune defaults; intent unclear (defensive-for-rebinds vs latent ordering bug).

  Coverage and limits:
  - Covered: config validation paths, override merge semantics, cross-context routing, help/modal/detail/board key handling, footer/help text derivation.
  - NOT explored (out of scope for this keybindings-focused session): launcher interpolation/security, the rich editor handoff flow, gateway/bd subprocess behavior, dashboard rendering, search query/result correctness, startup/CLI flags beyond --check-config, mutation flows (create/update/close/comment) end to end.
  - Tooling limit: ctrl+space (NUL byte) and f13-f16 sequences could not be sent via scripts/capture_bwb_screen.py, so search-mode entry and f-key mode switching were analyzed from source rather than driven live.
