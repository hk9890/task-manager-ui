body: |-
  Finding: Flag-parsing library is undecided and will drive implementer improvisation. Why: stdlib flag does not cleanly support both -h and --help, short-flag clustering, or rejecting -version-as-double-dash; choosing pflag/cobra mid-task is a dependency decision that belongs in planning. Suggested action: pick the library now (recommend stdlib flag with manual -h/--help + -v/--version aliasing to avoid a new dep, OR explicitly adopt spf13/pflag) and record the choice in the epic Decisions section before s2d1.1 starts.
