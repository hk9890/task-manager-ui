body: |-
  Finding: Exit-code contract is unspecified across flags. Why: --help/--version/--check-config/--print-config and unknown-flag handling have GNU/POSIX conventions that will be inconsistently applied without a single contract; verifier in s2d1.4 cannot check codes that were never specified. Suggested action: add a Decisions bullet to the epic stating: success paths exit 0; --check-config validation failure exits 1; unknown flag / bad usage exits 2; missing required flag arg exits 2.
