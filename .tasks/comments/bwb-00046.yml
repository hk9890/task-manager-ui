body: |-
  Investigation-first framing is unnecessary given the code analysis. What: the issue is written as 'investigate whether this is real' but the code clearly shows the view/model mismatch. The acceptance criteria are investigation-oriented rather than fix-oriented. Why: this adds an unnecessary investigation phase before implementation. Suggested action: update acceptance criteria to: (1) dependency pane renders each issue ID exactly once in its first-appearing group, (2) every visible issue row is reachable by one-at-a-time traversal, (3) test covers an issue appearing in multiple dependency groups.
