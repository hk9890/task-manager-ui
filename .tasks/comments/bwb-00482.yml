  Acknowledging the existing rationale at internal/gateway/beads/read_gateway.go:538-541: the gateway intentionally never claims Exact because bd ready/blocked apply their own upstream caps, so completeness can't be proven for those sources even when the local post-filter count is under the limit. The underlying logic is deliberate and correct — this finding is NOT about that. It is purely the user-facing LABEL: 'partial' renders as '2 partial' even when all matches ARE shown, which reads as 'incomplete'. Suggested fix stays label-only: rename/clarify the badge (e.g. drop it when the result set is small and fully displayed, or word it as a cap hint rather than 'partial'), and remove whichever of the Exact enum value / 'exact' UI branch remains genuinely unreachable.
