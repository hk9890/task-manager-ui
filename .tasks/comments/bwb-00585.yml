id: zlvdq5cl
author: Hans Kohlreiter
created: 2026-04-12T14:05:58Z
body: |-
  Detail is not a mode.Controller — structural asymmetry the task should address explicitly. What: Board and search implement the mode.Controller interface (Init/Update/View/SetSize), but detail is a raw detailsmode.Model struct managed directly by the shell with ad-hoc sizing (detailViewportHeight(), width-8 content width, FormSection wrapping in renderBody). The shell's renderBody() applies completely different sizing logic for detail vs board/search. Why: A 'shared full-height workspace contract' that only standardizes the numbers but leaves the structural asymmetry (Controller vs raw struct) in place will be fragile. The shell will still have two different sizing paths. Suggested action: The instructions should explicitly call out that the detail sizing path in renderBody() and detailViewportHeight() must be unified with the board/search SetSize path, even if detail doesn't become a full Controller. At minimum, detail needs to receive the same (width, height) contract board/search get via SetSize rather than deriving dimensions ad-hoc.
