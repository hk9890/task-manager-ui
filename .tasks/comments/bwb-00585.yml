id: jkhi6f6j
author: Hans Kohlreiter
created: 2026-04-12T14:06:07Z
body: |-
  Acceptance criteria need a concrete measurable for full-height. What: Criterion says 'Full available body height is used consistently' but does not define what 'full available body height' means numerically. Currently board/search get max(14, height-7) and detail gets max(1, max(14, height-7)-2), which are already different by 2 lines. Why: Without a concrete formula (e.g., 'body height = terminal height - header lines - footer lines, with no additional padding or wrapping'), a tasker may produce a new contract that is still inconsistent but in a different way. The verifier also cannot objectively check this criterion. Suggested action: Add an explicit acceptance criterion like 'All primary screens receive body dimensions as (termWidth - shellHorizontalChrome, termHeight - headerLines - footerLines) with no mode-specific adjustments to the body budget'.
