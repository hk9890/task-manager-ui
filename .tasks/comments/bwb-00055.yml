  Review: This is partially already implemented. Code at model.go:178-186 shows moveRelatedSelection is called on scroll-up/down when FocusPaneDependencies is active, and BrowserSelectedIndex is tracked. The real bug is in the render side: renderReferenceRow (details.go:526-532) hardcodes Selected:false and Styled:false, so the selection state is never visually reflected. What: the model-side selection logic exists; only the render path is broken. Why: this means the fix is simpler than the description implies — it's a render wiring bug, not a missing navigation model. Suggested action: narrow the description to 'pass BrowserSelectedIndex to renderReferenceRow so Selected reflects actual state'. This overlaps heavily with beads-workbench-2a6 (Styled:false). Consider merging them into one fix.
