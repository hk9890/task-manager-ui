  Reviewer analysis: root cause is synthetic KeyMsg rune injection from internal/app/model.go into search.Update(), which is interpreted as user typing before reload key matching when query focus is active. Recommended fix: expose an explicit search reload API (for example Reload() tea.Cmd calling triggerSearch()) and have shell orchestration call that instead of synthesizing a key event.
