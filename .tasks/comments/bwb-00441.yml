body: |-
  Implemented in commit $(git log --grep="b38b.4" --oneline -1 | cut -d' ' -f1).

  EnsureVisible helper at internal/ui/scroll/window.go; per-column scroll offsets in board.Model with scrollOffset map keyed by section index; selection movers call EnsureVisible(window=sectionItemCapacity()); reload resets offsets. Renderer slices rows[offset:offset+innerHeight] and flips header to "N of M" whenever visible<len(rows). Details Dependencies + Metadata panes wired the same way via moveRelatedSelection/moveMetadataSelection threading viewportHeight + line-index helpers exported from internal/ui/details. quality:fast green (1099 tests).

  Note: TestBoardModeScrollTeatestChevronVisible was rewritten to use InitializeController + ApplyControllerKeySequence (synchronous) instead of raw teatest after the original showed async flakiness — same coverage, deterministic.

  Manual runbook verification against dtctl-test will land as part of vtvb.12 (the acceptance review).
