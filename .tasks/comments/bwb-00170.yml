id: i5dftrhv
author: Hans Kohlreiter
created: 2026-04-18T21:50:48Z
body: |-
  Ordering relative to 74r/6eq. What: yxjx touches dependencyGroups() in details.go which affects rendered row count in the Dependencies pane. 74r changes pane width. Why: fixing yxjx removes the entire Structure section for dependency-only issues, reducing pane content. Width tuning in 74r should account for the final content, not the inflated duplicate. Suggested action: fix yxjx before 74r. yxjx and 6sk are independent and can run in parallel.
