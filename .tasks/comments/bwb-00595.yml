body: |-
  AC 'Board issue row color hierarchy improves scanability without overflow regressions' is not testable without a baseline. What: the verifier needs to compare before/after board rendering to assess 'improvement'. How does the verifier judge that scanability improved? Why: 'improves scanability' is subjective. The verifier can check that colors are present and that truncation still works, but cannot measure improvement. Suggested action: replace with concrete criteria: (a) type, priority, and status tokens render with distinct foreground colors, (b) issue IDs render in muted foreground, (c) board golden tests pass with no truncation regressions at w80, w120, w180.
