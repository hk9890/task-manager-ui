body: |-
  Implemented pruneStaleLogFiles in internal/logging/logging.go, called from buildPersistentSink on startup. Globs bwb-*.log in the state dir, computes cutoff from time.Now().AddDate(0,0,-rotationMaxAgeDays) reusing the existing 30-day constant (no second hardcode), skips the current session's file unconditionally, and ignores per-file stat/remove errors so a prune failure never blocks startup.

  Unit test TestPruneStaleLogFiles added: stale files removed, fresh files kept, current session file kept regardless of age, non-matching files untouched. Passes under -race.

  docs/MONITORING.md updated with a bullet describing the prune behavior under 'Implemented behavior'.

