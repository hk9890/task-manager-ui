created: 2026-04-08T10:59:01Z
body: |-
  Acceptance criteria are not testable — 'distinct highlighted treatment' and 'lower-emphasis muted styling' are subjective. What: the criteria say active tab has 'distinct highlighted treatment' and inactive tabs render with 'lower-emphasis muted styling'. There is no way to verify this in a test except by checking specific ANSI escape codes, which the existing golden tests strip. Why: the verifier cannot pass or fail this without running the app and judging visually. Suggested action: either (a) define the specific styles (e.g., active tab = bold + white-on-blue, inactive = dimmed foreground, footer = TextMutedColor), or (b) state that acceptance is visual-only review by the user. Option (a) is better because it lets the tasker make the right choices without guessing.
