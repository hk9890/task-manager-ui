id: wx2lb3up
author: Hans Kohlreiter
created: 2026-05-22T10:24:05Z
body: |-
  Review (2026-05-22): VERIFIED end-to-end. Default nvim launcher (model.go:63) ships '+call append(0,[...{{issue.title}}...])'; Interpolate() (service.go:113-127) substitutes unescaped (stripC0 removes only control chars, not "/]/|). process_runner.go:60 uses exec.Command (no shell) — so this is NOT shell injection, but nvim executes the '+'-arg as a vimscript Ex command, so a crafted title breaks out and chains arbitrary Ex commands. Trigger chain confirmed: n key -> keybindings.go:120 ShellActionLaunchNvim -> app/model.go:771/779 -> launchActionCmd("nvim"). Same vulnerability CLASS as P0 db0z.1, different mechanism; threat model is the project's own (Rule 6). KEEP P1 (P0 only if shared/untrusted beads DBs are explicitly in-scope). RECOMMEND SPLIT: (1) P1 code fix — harden the default nvim template (temp-file context, vimscript-safe escaper, or non-executing arg path); (2) separate doc follow-up — generalize CODING.md Rule 6 from 'sh -c/-lc' to the principle 'untrusted fields never embedded where a launched tool re-parses them as code'. Note: the opencode launcher passes fields as discrete argv/env values and is NOT affected.
