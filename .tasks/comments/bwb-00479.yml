body: |-
  Priority raised P2->P1. The vulnerability class matches the P0 shell-injection bug db0z.1 (arbitrary code execution); held one notch below P0 only because exploitation is multi-step — it requires nvim to be the configured launcher (it is the default) AND the operator to press 'n' on an attacker-controlled issue. Maintainer should re-triage to P0 if shared/untrusted beads DBs are in the threat model.
