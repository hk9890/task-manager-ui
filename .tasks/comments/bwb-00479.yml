id: kn842ohx
author: Hans Kohlreiter
created: 2026-05-22T11:01:24Z
body: |-
  Fixed & verified (acceptance review 2026-05-22). Default nvim launcher hardened via fix option (b): the +call append(...) Ex-command vector removed; nvim Args are now static strings only (+normal! gg / +setlocal nomodifiable / +file [Issue]) and issue fields travel as discrete BWB_ISSUE_* env-var values (non-executing path, matches the opencode launcher). Security test uses the exact injection payload and proves the title cannot execute. docs/CODING.md Rule 6 generalized from sh-specific wording to the principle 'untrusted fields must never be embedded where a launched tool re-parses them as code', with sh and nvim as concrete instances. Verifier: PASS. Full quality suite green. UX note recorded by tasker: operator no longer sees issue context inline on nvim open (access via $BWB_ISSUE_* env vars) — file a P3 follow-up only if visible-on-open context is wanted.
