  Investigation: release tag v0.1.0 exists on GitHub but has zero attached assets. The repository currently has CI only and a manual release doc, but no packaging/upload automation (no GoReleaser config and no release workflow). This is why mise github backend cannot match linux-x64 assets. Plan: add tag-triggered GitHub release automation that builds archives for supported platforms, update release docs, and backfill v0.1.0 assets.
