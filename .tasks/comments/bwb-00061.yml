body: |-
  Update after fix: repository-side release problem is corrected. v0.1.0 now has uploaded assets (linux/macos x64+arm64 plus checksums), and the repo now has tag-triggered GoReleaser automation. However, local verification with mise 2026.3.5 still fails and reports an empty available-asset list even though GitHub API/gh release view show the assets. This points to an additional mise/private-GitHub backend issue or stale/private-auth behavior outside this repo. The repo-side bug remains fixed for future releases and for consumers that can see private release assets correctly.
