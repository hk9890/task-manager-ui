body: |-
  Review: Ordering relative to 74r/6eq. What: 2l4 is a functional bug (dependency browsing is broken); 74r/6eq are cosmetic layout bugs. Why: 2l4 blocks the core use case of navigating dependencies. Layout polish on a non-functional pane is wasted effort if 2l4 changes how BrowserItems are populated (which may affect row count and scroll behavior). Suggested action: implement 2l4 before 74r/6eq. x2u is independent (gateway-only, no UI coupling) and can proceed in parallel with anything.
