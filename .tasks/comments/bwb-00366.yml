  Contradiction: step 2 strips \x0a (newline is in \x00-\x1f) but step 3 expects literal \n to survive. Pick (a): strip all C0 including \x0a and update step 3's test to assert \n is stripped. Newlines in argv/env are exploitable for ANSI/log injection.
