id: u5xqunlb
author: Hans Kohlreiter
created: 2026-04-12T11:13:31Z
body: |-
  Review finding — helper function cleanup scope is implicit. What: read_gateway.go lines 552-896 contain ~15 helper functions (stringFromMap, intFromMap, optionalStringFromMap, timestampFromMap, mapArrayFromMap, etc.) that exist solely to extract fields from map[string]any. These should be deleted when typed decoding replaces them. Why: if the helpers survive alongside typed structs, the codebase has dead code and the refactor is incomplete. Suggested action: add explicit acceptance criterion: 'generic map extraction helpers (stringFromMap, intFromMap, etc.) are removed or reduced to the minimum needed for any remaining untyped paths.'
