id: 7pd1t3q6
author: Hans Kohlreiter
created: 2026-04-12T11:13:27Z
body: |-
  Review finding — bd --json stability assumption should be pinned. What: the task description says 'stable bd --json output justifies typed command payloads' but does not specify what version of bd this was validated against or how to detect breaking changes. Why: if bd updates its JSON schema, typed structs will silently drop new fields (fine) or fail on removed/renamed fields (not fine). The current map-based approach is ironically more resilient to schema drift. Typed decoding is still the right call, but the task should acknowledge the tradeoff. Suggested action: add a note in instructions: 'use json tags with omitempty where appropriate so optional/new fields do not cause hard failures. Consider adding a lightweight integration smoke test that runs bd list --json against a real beads project to catch schema drift.'
