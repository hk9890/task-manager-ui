body: |-
  Review finding — scope is clear but write paths are excluded without justification. What: the task targets read paths only. writes.go also likely uses similar patterns. Why: if writes.go uses map[string]any or untyped patterns, excluding it from this task means the gateway still has mixed decoding strategies after the epic closes. The acceptance criterion says 'primary read paths no longer decode through map[string]any' which is fine as scoping language — but the epic success criteria says 'internal/gateway/beads decodes stable bd --json payloads through typed structs instead of generic maps' without qualifying read-only. Suggested action: either (1) verify writes.go does not decode JSON responses through maps and document that it is already clean, or (2) if write commands return JSON output that gets decoded through maps, include those paths in scope.
