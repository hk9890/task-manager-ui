id: d162fjmy
author: Hans Kohlreiter
created: 2026-04-12T11:12:35Z
body: |-
  Review finding — forwardBoardMessage/forwardSearchMessage will need structural change. What: lines 726-744 forward messages to m.board and m.search through mode.Controller interface (m.board.Update(msg) returns (Controller, tea.Cmd) and reassigns m.board). With concrete types, this forwarding must change to call board/search-specific Update methods and handle concrete return types. Why: this is load-bearing shell wiring, not just cosmetic. The forwarding pattern plus shouldForwardToBoard/shouldForwardToSearch is where the rubber meets the road. Suggested action: explicitly note in instructions that message forwarding in model.go must be refactored alongside the storage change.
