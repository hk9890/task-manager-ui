id: v9g2lsus
author: Hans Kohlreiter
created: 2026-04-12T11:12:25Z
body: |-
  Review finding — Update signature change not addressed. What: board.Model.Update() returns (mode.Controller, tea.Cmd) at line 96 and search.Model.Update() returns (mode.Controller, tea.Cmd) at line 76. If wz9.1 removes mode.Controller, these return types must change. The task instructions say 'update board and search constructors, message flows, and tests' but do not explicitly call out the Update() return type change. Why: the tasker needs to know that removing mode.Controller means choosing a new return convention for board/search Update methods. Returning concrete *board.Model/*search.Model is the obvious answer, but the shell then needs to store and call them differently (no more polymorphic Update). This is the core mechanical challenge of wz9.1 and the instructions should be explicit. Suggested action: add to instructions: 'Update board.Model.Update() and search.Model.Update() to return concrete types instead of mode.Controller. Update shell message forwarding in model.go accordingly.'
