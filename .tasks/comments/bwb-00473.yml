body: |-
  Corroboration from iteration 8: the help overlay body (shellKeyHelp, internal/app/model.go:1300) renders the line '<key> = toggle help' using keys.DisplayLabel(ShellContext, ShellActionHelp) -- i.e. the CONFIGURED help key. So after rebinding toggle_help to e.g. 't', the help overlay itself displays 't = toggle help', which is false: 't' opens but does not close. The misleading on-screen label makes the bug worse for the operator.
