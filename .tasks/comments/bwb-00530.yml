body: |-
  Simplification — consider merging .1 and .2. What: The design task blocks implementation but the design is small enough (CLI interface + step syntax + output schema) that it can be a section at the top of the implementation task. Why: Separate design and implement tasks for a single-script extension adds coordination overhead without value. The implementer IS the designer here. Suggested action: Merge .1 into .2 as a design-then-implement task, or at minimum make .1 output just the CLI spec (30 lines max) so it closes fast.
