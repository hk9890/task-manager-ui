body: |-
  Scope risk — design task has no concrete output format defined. What: AC says choose a script-first approach and define minimal capabilities but does not say what the deliverable IS. A design task with vague deliverables tends to either produce a mini design doc nobody reads, or gets skipped because the implementer just starts coding. Why: Without a defined output, this task is hard to verify as done. Suggested action: Make the deliverable explicit — the design output should be the exact CLI interface (flags/step syntax), JSON output schema, and 2-3 example commands covering the target flows. That is the design. Nothing else needed.
