id: ztjnixhc
author: Hans Kohlreiter
created: 2026-04-19T19:34:03Z
body: |-
  Proposed compact spec for ad-hoc verification toolkit:\n\n1) PTY step syntax (exact)\n- CLI: verify-pty --cmd '<app command>' --step '<STEP>' [--step '<STEP>' ...] [--json-out <path>]\n- STEP grammar (no branching):\n  - send-key:<key>\n  - wait-for-text:<literal text>[:<timeout-ms>]\n  - wait-for-no-text:<literal text>[:<timeout-ms>]\n  - checkpoint:<name>\n- Key tokens: up,down,left,right,enter,esc,tab,shift+tab,ctrl+c,backspace,space,char:<c>\n- Default timeout for wait steps: 2000ms (if omitted).\n\n2) Polling + timeout behavior\n- wait steps poll terminal buffer every 50ms.\n- wait-for-text succeeds on first poll containing literal substring.\n- wait-for-no-text succeeds on first poll where substring is absent.\n- Timeout is per-step (not global): step fails when elapsed > timeout-ms.\n\n3) Step failure reporting (JSON)\n- Top-level JSON:\n  {\n    "ok": <bool>,\n    "command": "...",\n    "started_at": "RFC3339",\n    "ended_at": "RFC3339",\n    "steps": [ ... ],\n    "checkpoints": [ ... ],\n    "cleanup": {"status":"ok|forced","actions":["ctrl+c","term","kill"]}\n  }\n- Step entry schema:\n  {\n    "index": <int>,\n    "raw": "wait-for-text:Saved:1500",\n    "type": "send-key|wait-for-text|wait-for-no-text|checkpoint",\n    "timeout_ms": <int|null>,\n    "status": "pass|fail|skipped",\n    "started_at": "RFC3339",\n    "ended_at": "RFC3339",\n    "error": {"code":"timeout|runtime","message":"..."}|null,\n    "observed_excerpt": "last 20 lines joined"\n  }\n\n4) Checkpoints choice\n- Use named snapshots (checkpoint:<name>) stored in top-level checkpoints array; no inline blob on every step.\n- checkpoint entry: {"name":"...","step_index":<int>,"captured_at":"RFC3339","screen_excerpt":"last 40 lines"}.\n\n5) Cleanup expectations on timeout/failure\n- On first step failure: stop executing remaining steps (mark remaining as skipped), then cleanup child process:\n  1) send ctrl+c, wait 300ms\n  2) if alive send SIGTERM, wait 700ms\n  3) if alive send SIGKILL\n- Record performed cleanup actions in cleanup.actions.\n\n6) Separate wrapper for persisted-state checks\n- Wrapper CLI (separate script): verify-state-wrap --issue <id> --pty-cmd '<verify-pty ...>' --expect-change '<jq expr on {before,after}>'\n- Wrapper flow:\n  1) before=\n  2) run verify-pty\n  3) after=\n  4) evaluate jq expression against {before,after}\n- Wrapper exit fails if PTY fails OR jq expectation is false.\n\n7) Example commands\n- Read-only navigation:\n  verify-pty --cmd 'beads-workbench' --step 'wait-for-text:Ready:3000' --step 'send-key:down' --step 'send-key:enter' --step 'wait-for-text:Issue Details:1500' --step 'checkpoint:details-open' --step 'send-key:esc' --step 'wait-for-no-text:Issue Details:1500'\n- Mutation save verification:\n  verify-state-wrap --issue beads-workbench-ay5j --pty-cmd "verify-pty --cmd 'beads-workbench' --step 'send-key:e' --step 'wait-for-text:Edit:1500' --step 'send-key:char:x' --step 'send-key:ctrl+s' --step 'wait-for-text:Saved:1500'" --expect-change '.before.title != .after.title'\n- Mutation cancel/no-save verification:\n  verify-state-wrap --issue beads-workbench-ay5j --pty-cmd "verify-pty --cmd 'beads-workbench' --step 'send-key:e' --step 'wait-for-text:Edit:1500' --step 'send-key:char:x' --step 'send-key:esc' --step 'wait-for-no-text:Edit:1500'" --expect-change '.before == .after'\n\nThis keeps the toolkit script-first, minimal, and implementation-ready without a generalized DSL.
---
