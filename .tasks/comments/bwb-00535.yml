id: 290q277y
author: Hans Kohlreiter
created: 2026-04-19T08:50:03Z
body: |-
  Search refresh uses synthetic KeyMsg injection which is fragile. What: refreshActiveSurfaceCmd for search mode (line 768-773) synthesizes a tea.KeyMsg to trigger reload, coupling refresh logic to the current keybinding configuration. Why: if keybindings change, or the search model's internal key handling evolves, this will silently break. It also bypasses the search model's public API. Suggested action: expose a Reload() tea.Cmd method on the search model (like board uses Init()) and call that directly.
---
id: di684sbi
author: Hans Kohlreiter
created: 2026-04-19T08:50:11Z
body: |-
  Board refresh re-uses Init() which may reset selection state. What: refreshActiveSurfaceCmd calls m.board.Init() (line 763) to refresh the board. Why: Init() typically performs full initialization including resetting internal state like cursor position and selection. If board.Init() reloads data AND resets the selection to the first item, users will lose their place after every 60s tick or focus-regain. Suggested action: verify board.Init() preserves selection, or add a dedicated Refresh() method that reloads data without resetting cursor.
---
id: 5f8db2em
author: Hans Kohlreiter
created: 2026-04-19T08:50:20Z
body: |-
  Tick reschedule on refreshTickMsg fires even when blurred. What: the refreshTickMsg handler (line 243) always reschedules the next tick and calls maybeAutoRefreshActiveSurfaceCmd. The maybeAutoRefreshActiveSurfaceCmd correctly suppresses the actual refresh when blurred, but the tick timer keeps spinning indefinitely regardless. Why: this is mostly fine — timers are cheap and the refresh is suppressed — but it means the app accumulates one pending timer per 60s while blurred. Not a bug, just slightly wasteful. No action needed unless you want to defer rescheduling until focus returns.
