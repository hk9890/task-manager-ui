created: 2026-04-19T08:50:27Z
body: |-
  Focus/blur/tick logic is correct and well-tested for acceptance criteria. What: The implementation correctly handles (1) focus reporting via tea.WithReportFocus(), (2) blur->focus transitions triggering one refresh, (3) repeated focus msgs being no-ops via wasBlurred guard, (4) tick fallback when focusKnown is false, (5) modal and loading guards. Tests cover all these paths explicitly. The 60s constant is named and clear. No crashes from missing state. Verdict: implementation is solid for the stated scope.
