body: |-
  Review — scroll architecture analysis: The scroll implementation is purely integer-offset based (applyScrollAction at model.go:370-386) with move=1 per key press. There is NO animation, momentum, or async scroll. The 'continues after key stops' symptom is almost certainly terminal key-repeat buffering: held keys generate a burst of KeyMsg events that queue in Bubble Tea's event loop, and the UI processes them after the key is released. This is not a bug in this codebase — it's standard terminal key-repeat behavior. What: the reported symptom is likely terminal key-repeat event queuing, not a scroll state bug. The 'slow' feel is because move=1 scrolls one line per keypress, which at terminal repeat rates feels sluggish for long content. Why: if the real problem is key-repeat perception, the fix is either (a) debouncing scroll events or (b) increasing scroll step size, NOT fixing scroll state logic. Suggested action: (1) verify by testing with a single discrete key tap — if one tap = one line and it stops, it's key-repeat. (2) If confirmed, downgrade to P2 and consider increasing scroll-down step to 2-3 lines, or adding j/k acceleration on held keys. Do NOT redesign the scroll system for a non-bug.
