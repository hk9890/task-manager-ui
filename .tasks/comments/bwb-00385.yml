id: y35s916u
author: Hans Kohlreiter
created: 2026-04-19T21:57:40Z
body: |-
  Verdict on approved direction: SOUND but order-of-operations matters. What: the approved 3-pane wide layout + small-width fallback + shared content/metadata renderers is the right shape, and earlier comments already enumerated the helper extraction needed. Why: without doing the helper extraction FIRST as its own commit, the implementer will inevitably either (a) duplicate FormSection wrapping or (b) inline-copy renderContentPaneLines/renderMetadataPaneLines into search.go and the two surfaces will drift again within a release. Suggested action: add an explicit acceptance criterion 'ui/details exposes RenderContentPane(detail, width, height, focused, scrollOffset) string and RenderMetadataPane(detail, width, height, focused, scrollOffset, selectedField) string, and detail mode's renderThreePane is rewritten to consume those same exported helpers' as the FIRST item, before any search-layout work.
---
id: 2pcoetp9
author: Hans Kohlreiter
created: 2026-04-19T21:57:45Z
body: |-
  Coupling finding with 2shr.2: aqps and 2shr.2 share the EXACT SAME prerequisite (exported per-pane render helpers) and the SAME stale-detail loading rule. What: both issues need (a) RenderContentPane/RenderMetadataPane public helpers and (b) a deterministic 'SelectionID does not match m.detail.Detail.Summary.ID -> render from IssueSummary stub with loading affordance' rule. Why: if aqps lands first and defines this rule one way, 2shr.2 inherits it for free; if they're built independently the loading affordances will diverge between search and detail-dependency live preview. Suggested action: keep the issues split (different layouts, different focus models) but mark 2shr.2 as 'blocked-by aqps' and call out in aqps that its helper extraction and stale-detail rule MUST be reusable by detail-mode dependency browsing.
---
id: gn4mq85d
author: Hans Kohlreiter
created: 2026-04-19T21:57:52Z
body: |-
  Shell finding: do NOT add a search-owned detail loader. What: app/model.go:387-395 already runs ensureDetailForCurrentSelectionCmd on every SelectionChangedMsg from search; m.detail.Detail is the canonical loaded detail. The mode/search/model.go View() currently throws this away and only renders from in-memory IssueSummary via uidetails.Render(Compact:true). Why: any second loader would race the shell's loader and create double-fetches. Suggested action: change uisearch.State to accept a LoadedDetail domain.IssueDetail field; the shell (app.Model.renderBody) constructs the State and passes m.detail.Detail when m.detail.SelectionID == search's selected ID and m.detail.Loading == false, otherwise passes the IssueSummary stub. Add this as an explicit acceptance criterion: 'mode/search must not call gateway.ShowIssue; preview pane data is supplied by the shell.'
---
id: cfldnaq1
author: Hans Kohlreiter
created: 2026-04-19T21:57:59Z
body: |-
  Stale-preview rule (acceptance criterion missing): What: when m.detail.SelectionID != m.detail.Detail.Summary.ID OR m.detail.Loading is true, the search Content+Metadata panes must render a deterministic placeholder, not stale prior-issue data. Why: today's compact preview hides this by falling back to the IssueSummary, but full Content+Metadata panes will visibly flash the previous issue's description/comments when the user arrows down a row faster than gateway.ShowIssue resolves. Suggested action: add AC bullet 'while highlighted result has not been loaded yet, Content pane shows title/ID/status from IssueSummary plus a single Loading… line; Metadata pane shows only the Core group from IssueSummary (Type/Status/Priority); both panes show the same loading affordance the dedicated detail loading.View uses.' Add a golden case for this state.
---
id: r20mw85y
author: Hans Kohlreiter
created: 2026-04-19T21:58:06Z
body: |-
  Responsive fallback rule (acceptance criterion still under-specified). What: detail mode's splitThreePaneWidths reserves metadataRailWidth=34 + leftRailMin=24 + minContent=20 + 2x detailColumnGap=4 = ~82 chars before truncation kicks in hard, and search rail wants to be WIDER than detail's left rail. The current narrow golden is at w80. Why: 'small/narrow fallback layout' is too vague — implementer + verifier need a number. Suggested action: pick an explicit threshold and document it: e.g., 'at width >= 110, render Search rail | Content | Metadata; at width < 110, render Search rail | (Content stacked over Metadata) in a single right column; below ~70 fall back to results-only'. Goldens should exist for at minimum w80 (narrow), w110 (boundary), w140 (wide). Add the breakpoint number to AC, not just 'small fallback'.
---
id: 2i8ubnil
author: Hans Kohlreiter
created: 2026-04-19T21:58:12Z
body: |-
  Focus-model gap (still): What: with FocusQuery + FocusResults + new Content + new Metadata, search has 4 focus states while detail has 3. Approved direction did not pick a key-by-key rule. Why: ambiguous Left-from-Content behavior breaks both implementer and tests. Suggested action (recommended): treat the search rail as a single 'rail' for Left/Right traversal — Left from Content -> Results (NOT Query); Query is reachable only via the dedicated focus-query keybinding (config.SearchActionFocusQuery, today '/'). Up/Down inside Results is the live-preview driver; typing while Query is focused still triggers triggerSearch. Document this exact rule as an AC bullet and add a focused mode test asserting the focus transitions for {Left, Right, Tab, Shift-Tab, /}.
---
id: 4fu9vqdj
author: Hans Kohlreiter
created: 2026-04-19T21:58:18Z
body: |-
  Metadata interactivity decision still missing. What: detail mode's metadata pane reacts to Enter on Status/Priority by emitting pendingOpenStatusDialog/pendingOpenPriorityDialog, which the shell turns into modals (app/model.go:425-453). If search's Metadata pane is the same component, users will reasonably expect those keys to work. Why: silently disabling them in search will surprise users; enabling them requires routing the same intents from search through the shell. Suggested action: pick one explicitly. Recommended: enable Enter-on-Status/Priority in search by promoting ConsumeOpenStatusDialogIntent/ConsumeOpenPriorityDialogIntent to a shared intent path that the shell checks regardless of active mode (search OR detail). Add the chosen rule to AC and add a search-mode test that Enter on metadata Status with FocusMetadata produces a status modal request.
---
id: grumzz62
author: Hans Kohlreiter
created: 2026-04-19T21:58:24Z
body: |-
  Tests/goldens essential before merge. What: (1) wide layout golden Search|Content|Metadata at w140 with selection loaded; (2) wide golden when SelectionID != Detail.Summary.ID (loading affordance); (3) narrow fallback golden at w80; (4) boundary golden at the chosen breakpoint (e.g., w110); (5) empty-results wide golden (no Content/Metadata, just placeholders); (6) focused mode test asserting m.search does not call gateway.ShowIssue when arrowing through results; (7) focused app/model_test asserting SelectionChangedMsg from search still triggers ensureDetailForCurrentSelectionCmd; (8) focused detail render tests must keep passing UNCHANGED after helper extraction (proves the refactor was a no-op for detail mode). Suggested action: add this test list as an AC checklist so the implementer cannot skip the loading/breakpoint cases.
