id: updrcqe7
author: Hans Kohlreiter
created: 2026-04-19T21:42:17Z
body: |-
  Architectural finding: True component reuse is structurally feasible but requires a small refactor first. What: ui/details exposes only Render(State) publicly; the genuinely reusable units (renderContentPaneLines, renderMetadataPaneLines, renderMetadataRail, splitThreePaneWidths, sliceWithOffset, MaxScrollOffsets per-pane) are package-private. uidetails.Render with Compact:true does not produce the same boxed Content/Metadata panes detail mode shows. Why: 'reuse the same renderer' as written in the issue is misleading — search would either (a) duplicate the FormSection wrapping logic or (b) we extract small public helpers like RenderContentPane(detail, width, height, focused, scrollOffset) string and RenderMetadataPane(detail, width, height, focused, scrollOffset, selectedField) string. Suggested action: before any UI work, add an acceptance criterion that ui/details exposes per-pane render helpers that BOTH detail mode and search mode call, and rewrite renderThreePane to consume those same helpers so divergence is impossible by construction.
---
id: odiq86yj
author: Hans Kohlreiter
created: 2026-04-19T21:42:27Z
body: |-
  Shell architecture finding: detail-on-selection already works, but search must NOT own its own detail loader. What: app/model.go already runs ensureDetailForCurrentSelectionCmd() on every mode.SelectionChangedMsg from board OR search (line 387-395), and m.detail is shell-owned. Search currently throws this loaded detail away and renders only its in-memory IssueSummary via uidetails.Render(Compact:true). Why: this means the data plumbing for 'arrow keys update content+metadata' is already in place — search just isn't reading from it. The cleanest implementation is for search.View to receive m.detail (the loaded IssueDetail) from the shell and pass it to the shared content/metadata helpers. Suggested action: change search.Render's State to accept a fully loaded domain.IssueDetail (provided by the shell from m.detail.Detail when m.detail.SelectionID == search's selected ID); do NOT add a second detail loader inside the search mode.
---
id: icpwzjoe
author: Hans Kohlreiter
created: 2026-04-19T21:42:36Z
body: |-
  Risk finding: stale-detail flicker during search typing. What: when the user types a new query, results change rapidly and the previously-loaded m.detail.Detail will not match the new top selection until the next loadDetailCmd resolves. If search renders the heavy content/metadata panes from m.detail, they will briefly show the previous issue's content alongside the new highlighted row in the rail. Why: today's compact preview hides this because it falls back to rendering from the in-memory IssueSummary (search.go lines 182-193). Suggested action: define explicit behavior — when SelectionID != m.detail.Detail.Summary.ID (or m.detail.Loading), render content/metadata panes from the IssueSummary stub plus a 'Loading…' affordance, mirroring the existing loading.View path. Add this as an acceptance criterion and a golden case.
---
id: 4svaq9wd
author: Hans Kohlreiter
created: 2026-04-19T21:42:46Z
body: |-
  Navigation finding: focus-cycle semantics in search mode have a real conflict with the rail being a query+results stack. What: detail mode treats Left/Right as a flat 3-pane traversal (Dependencies <-> Content <-> Metadata). The proposal says search should mirror this with rail<->Content<->Metadata, but the search 'rail' is itself two stacked sub-panes (Query and Results) and today distinguishes FocusQuery from FocusResults so up/down means 'edit query' vs 'move selection'. Why: collapsing both into a single 'rail' focus state breaks query editing; keeping them separate makes search a 4-state focus (Query, Results, Content, Metadata) which does NOT mirror detail mode and complicates 'left from Content goes to ???'. Suggested action: pick one explicitly in the issue — either (a) Left from Content -> Results, and Query is reachable only via the dedicated focus-query keybinding (recommended, preserves typing UX), or (b) Left from Content -> Results, Left from Results -> Query. Document the chosen rule in acceptance criteria with a key-by-key walkthrough.
---
id: qyf5jh2b
author: Hans Kohlreiter
created: 2026-04-19T21:42:55Z
body: |-
  Width finding: three full-height boxed panes will not fit at the w80 narrow golden. What: detail mode's splitThreePaneWidths reserves metadataRailWidth=34, leftRailMin=24, content min=20, plus 2x detailColumnGap=4 -> minimum ~82 chars before truncation kicks in hard. Search currently has a separate w80 narrow golden (search_results_narrow_w80.golden) that today fits because preview is a single right pane. Why: forcing three boxed panes at 80 cols will produce illegible output and probably break/regenerate the narrow golden in an ugly way. Suggested action: define the responsive rule explicitly — at widths below ~110, fall back to the current 2-pane layout (rail + combined preview) or hide the metadata pane. Add this as an acceptance criterion and provide both narrow and wide goldens.
---
id: znfu5iij
author: Hans Kohlreiter
created: 2026-04-19T21:43:04Z
body: |-
  Scope finding: original bug (golden mismatch from metadata indentation/order change) is being inflated into a redesign. What: the failing goldens in the description show only two regressions — Status/Priority order swap and a leading two-space indent in the metadata block. These come from a metadata renderer change in detail mode bleeding into search's compact preview. The redesign to three shared panes is a separate, larger user-driven scope (captured in epic 2shr comment). Why: bundling them risks the redesign blocking on cosmetic golden churn and vice versa. Suggested action: split into two issues — keep aqps narrowly as 'regenerate search goldens after metadata renderer change' (small, can land today), and create a new task 'Search mode three-pane redesign with shared content/metadata components' that owns the architectural work and the new acceptance criteria. The redesign should depend on the helper-extraction refactor recommended in earlier comment, not on this golden fix.
---
id: e83q85d0
author: Hans Kohlreiter
created: 2026-04-19T21:43:13Z
body: |-
  Acceptance criteria gaps. What: the current AC says 'left/right pane navigation matches detail-mode semantics' and 'changing selected search result automatically refreshes content and metadata without Enter' but does not specify: (1) the responsive fallback below ~110 cols, (2) the loading/stale-detail rendering rule when m.detail.SelectionID lags the search highlight, (3) the exact 4-state vs 3-state focus model for search (Query/Results/Content/Metadata), (4) whether the existing 'Preview' box title is replaced by 'Content'/'Metadata' titles to match detail mode (goldens will need this), (5) which detail-mode keys carry over (page-up/down, home/end on Content pane?), (6) whether dependencies are silently omitted or whether a one-line summary 'Blocked by: N · Blocks: N · Related: N' is shown on the rail. Why: without these spelled out, the implementer will guess and the verifier can't deterministically pass/fail. Suggested action: add each item above as an explicit acceptance bullet before starting implementation.
---
id: q8hyybtb
author: Hans Kohlreiter
created: 2026-04-19T21:43:23Z
body: |-
  Simpler alternative worth considering. What: rather than bringing the full three-pane detail layout into search, achieve 95% of the user's intent by (a) extracting RenderContentPane and RenderMetadataPane public helpers, (b) replacing search's current single right-side 'Preview' box with two stacked boxes on the right ('Content' on top, 'Metadata' below) both rendered via those shared helpers, (c) keeping today's left rail untouched (Search + Results), (d) keeping today's left/right and cycle key behavior with the third focus state being 'Metadata' added at the end. Why: this avoids the responsive layout problem (still 2 columns), preserves the existing query+results focus split, still gives true component reuse of content+metadata, and is a much smaller diff than re-doing the whole layout as 3 columns. Suggested action: ask the user explicitly whether they need 3 horizontal columns or whether a 2-column layout with stacked Content+Metadata on the right satisfies the 'shared rendering' goal. If 3 columns is non-negotiable, proceed with the full redesign and the responsive fallback above.
---
id: jo430ojq
author: Hans Kohlreiter
created: 2026-04-19T21:43:33Z
body: |-
  Maintenance risk: detail mode owns dialogs/intents (status, priority, dependency Enter-to-open) on its metadata and dependencies panes. What: details.Model.HandleKey produces OpenRelatedIssueIntent and pendingOpenStatus/PriorityDialog when those panes are focused. If search's Metadata pane is genuinely 'the same' component, users will reasonably expect Enter on Status to open the status dialog from search too. Why: either we wire those intents through the search mode (extra complexity and tests) or we silently disable them in search (surprises users — 'why does Enter work in detail but not search?'). Suggested action: pick one explicitly. Recommended: enable the same Enter-on-metadata-field behavior in search by routing through the existing m.detail intents at the shell level (m.detail.SelectionID is already kept in sync). Add this as an acceptance criterion or explicitly defer with 'metadata fields are read-only in search mode' in the AC.
---
id: qjuyt7v8
author: Hans Kohlreiter
created: 2026-04-19T21:52:37Z
body: |-
  Responsive fallback is now explicitly in scope for search. Detail-mode dependency/browser live-preview semantics are tracked separately in beads-workbench-2shr.2 so aqps stays search-focused.
