  User already resolved the primary open question. What: The open questions ask 'Which fields are editable in v1' and 'Does Enter open an inline picker, a compact modal, or a command-style chooser?' The user explicitly stated: 'status editing definitely desired first; priority may be a later extension, but status is the minimum useful workflow.' The interaction style (inline picker vs modal) is still open. Why: Half of this discussion task's blocking questions are already answered, making it partially executable. The remaining interaction-style question is genuinely open and should not block defining the scope. Suggested action: Update instructions to reflect that v1 scope is status-only, note that the interaction-style question (inline picker vs modal vs command chooser) is the sole remaining design decision, and unblock the task for implementation once the .1/.2 layout contract is landed.
