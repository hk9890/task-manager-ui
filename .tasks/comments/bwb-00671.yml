  Missing dependency on .1 and .2. What: Task .3 has no dependency on .1 or .2, but the metadata panel editing interaction will need to operate within the panel layout those tasks produce. The right metadata panel's sizing, focus model, and key handling all depend on the shared layout contract (.1) and the panel interaction model (.2). Why: If .3 is implemented before .1/.2, the metadata editing UI will be built against the current ad-hoc layout and will need to be reworked when the panel model lands. Suggested action: Add beads-workbench-9dn.1 and beads-workbench-9dn.2 as dependencies for .3.
