id: aoc716kz
author: Hans Kohlreiter
created: 2026-04-19T18:49:00Z
body: |-
  Current traversal order is determined by metadataGroups() field order in metadata.go:105-108: Type, Priority, Status. Only Priority and Status are editable, so actionable traversal is Priority→Status (top to bottom). What: if user expects Status first, the order is wrong. But the issue doesn't state what the expected order IS. Why: without specifying the target order, the implementer has to guess. Suggested action: state the intended order explicitly in acceptance criteria before implementation.
