body: |-
  Issue conflates two distinct problems. What: (1) field traversal order and (2) Priority edit UX are bundled in one bug. These have different resolution paths — order is a straightforward code fix, Priority UX needs a product decision. Why: mixing investigation-needed work with clear-fix work blocks the clear fix on the unclear one. Suggested action: split into two issues — one for traversal order (implementable now: verify and fix order in metadataGroups to Status-first-Priority-second or vice versa), one for the Priority edit UX product decision (dialog vs cycle). Alternatively, if you want to keep it as one issue, at minimum the acceptance criteria should mark criteria #3 (product decision) as a blocker for criteria #4 (Enter behavior consistency).
