  Tests: `mise run test` → 1136 pass, 0 fail, lint clean. Added TestDependencyRefLineIndexChildrenConsistency (BrowserSelectedIndex↔rendered-line, out-of-order child IDs to catch sort mismatch — the Q2 consistency guard), TestRenderDetailChildrenAnchoredToBaseDetail, TestBrowserItemsFromDependenciesIncludesChildren, TestRenderChildrenGroupGolden (new children_group.golden). 7 existing goldens regenerated.

  Q7 honored: no repository change (children already populated); not added as a checkbox. Out-of-scope finding filed separately: compact-mode summarizeReferences() omits the Children count (P4). Code committed by the orchestrator at epic close, not per-task.
