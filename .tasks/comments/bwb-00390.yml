  Most open questions are already answered by user decisions. What: The user's stated direction resolves panel roles (left=browser, center=content, right=metadata+actions), navigation model (Enter updates adjacent detail, consistent focus across app), and full-height/width contract (all screens must use full terminal dimensions consistently). Why: This task is blocking .1 and .2 but its open questions are largely resolved — leaving it as-is stalls execution unnecessarily. Suggested action: Convert this from a discussion task into a brief contract document task. The tasker should codify the user's stated decisions into acceptance criteria rather than re-discovering them. The remaining genuinely open question is: what does the panel model look like for board and search modes — do they also get the three-panel layout, or does only dedicated detail have it? That specific question should be explicitly answered before unblocking.
