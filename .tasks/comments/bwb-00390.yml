body: |-
  Missing open question: board/search panel model is undefined. What: The epic says 'board, search, and detail share a coherent panel-layout model' but the user's direction focuses on the dedicated detail three-panel layout. Board and search currently render as single full-body surfaces (board = column grid, search = query/results/preview). The .4 contract must explicitly state whether board and search adopt the same three-panel split or retain their current single-surface layouts with only the shared sizing contract applied. Why: If .1 and .2 assume board/search get the three-panel treatment but they don't, the shared layout contract will be over-designed. If they don't get it, the 'coherent panel model' success criterion needs to be scoped to mean 'consistent sizing plus shared primitives' not 'identical panel structure'. Suggested action: Add this as an explicit decision point in .4's instructions.
