id: uz4ppw4u
author: Hans Kohlreiter
created: 2026-05-11T05:23:10Z
body: |-
  Review finding: board and search truncation should not be treated as the same bug. Board column caps are a plausible intentional dashboard UX choice, but search capping without indication is the real user-facing gap. Recommendation: narrow this issue to search-result truncation specifically, and decide the implementation direction before coding (for example raise the search limit to a safer bound and/or surface a partial-results indicator). Also note that the current domain total count is derived from the capped result length, so the model cannot distinguish complete from truncated results today.
