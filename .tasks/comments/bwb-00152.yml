body: |-
  Review finding: this issue is not implementation-ready as written because the acceptance criteria allow multiple materially different fixes (stderr parsing, limit changes, UI indication, query redesign). Recommendation: keep this under review until the scope is tightened to a single direction.
---
id: 2roc14m2
author: Hans Kohlreiter
created: 2026-05-11T06:07:57Z
body: |-
  Discussion resolved: this is not a narrow bug fix but a fundamental design problem around capped search/result completeness. We want to treat this as an initiative and start with research, likely including whether the data access interface needs to change.
