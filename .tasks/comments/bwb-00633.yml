id: kqu4enva
author: Hans Kohlreiter
created: 2026-04-20T12:51:39Z
body: |-
  Review: Task does not require pushing the changelog commit before tagging in yixr.3. What: step 4 says 'commit those changes before tagging' but the next task (yixr.3) is the one that pushes. Per docs/CHANGE-WORKFLOW.md 'Landing the plane', work is not done until git push succeeds. Why: if the changelog commit is committed locally but never pushed before yixr.3 pushes the tag, the tag may point to a SHA that is on origin but the changelog SHA is not — or worse, the operator pushes the tag for a local-only commit. Suggested action: add an explicit 'git push' of the changelog commit as the final step of yixr.2 (and an AC: 'Changelog commit is on origin/main before this task closes').
