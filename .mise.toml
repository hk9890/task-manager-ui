[tools]
go = "1.26.3"
"go:gotest.tools/gotestsum" = "1.13.0"
"go:golang.org/x/tools/cmd/goimports" = "0.30.0"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2.1.6"

[env]
CGO_ENABLED = "0"

[tasks.build]
description = "Build the bwb binary"
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
go build -ldflags "-s -w \
  -X github.com/hk9890/beads-workbench/internal/version.Version=$VERSION \
  -X github.com/hk9890/beads-workbench/internal/version.Commit=$COMMIT \
  -X github.com/hk9890/beads-workbench/internal/version.Date=$DATE" \
  ./cmd/bwb
"""

[tasks.fmt]
description = "Format Go source"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint at pinned version"
run = "golangci-lint run --timeout=5m"

[tasks.guardrails]
description = "Architecture guardrails (fast)"
run = "go test ./cmd/bwb -run TestArchitectureGuardrails"

[tasks.test]
description = "Unit tests (fast, no external deps)"
run = "gotestsum --format pkgname-and-test-fails -- -race ./..."
[tasks.test.env]
CGO_ENABLED = "1"

[tasks."test:integration"]
description = "Integration tests (real bd binary, embedded fixture)"
run = "gotestsum --format pkgname-and-test-fails -- -race -tags=integration ./..."
[tasks."test:integration".env]
CGO_ENABLED = "1"

[tasks."test:coverage"]
description = "Run unit+integration tests and enforce coverage threshold"
run = """
go test -race -tags=integration -coverprofile=coverage.out -covermode=atomic ./...
COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
COVERAGE_INT=${COVERAGE%.*}
echo "Total coverage: ${COVERAGE}% (threshold: ${COVERAGE_THRESHOLD:-71}%)"
if [ "$COVERAGE_INT" -lt "${COVERAGE_THRESHOLD:-71}" ]; then
  echo "FAIL: below threshold"; exit 1
fi
"""
[tasks."test:coverage".env]
CGO_ENABLED = "1"

[tasks."test:all"]
description = "Run unit + integration tests"
depends = ["test", "test:integration"]

[tasks."test:verbose"]
description = "Unit tests with full per-test output (for debugging a hang or noisy failure)"
run = "gotestsum --format standard-verbose -- -race ./..."
[tasks."test:verbose".env]
CGO_ENABLED = "1"

[tasks."test:integration:verbose"]
description = "Integration tests with full per-test output (=== RUN / --- PASS for every test)"
run = "gotestsum --format standard-verbose -- -race -tags=integration ./..."
[tasks."test:integration:verbose".env]
CGO_ENABLED = "1"

[tasks."scripts:check"]
description = "Validate script syntax (shell + python)"
dir = "{{config_root}}"
run = '''
bash -n internal/testing/e2e/embeddedfixture/setup.sh
find scripts -maxdepth 1 -name '*.py' -print0 | xargs -0 python3 -m py_compile
'''

[tasks."quality:fast"]
description = "Fast pre-commit gate (NO integration tests; ~15s)"
depends = ["vet", "lint", "guardrails", "test"]

[tasks.quality]
description = "Full pre-handoff gate (includes integration tests; ~2min)"
depends = ["vet", "lint", "guardrails", "test", "test:integration"]

[tasks."fmt:check"]
description = "Check formatting (goimports + go mod tidy)"
run = """
OUT=$(goimports -local github.com/hk9890/beads-workbench -l cmd internal)
if [ -n "$OUT" ]; then
  echo "Files not formatted:"
  echo "$OUT"
  echo "Run: goimports -local github.com/hk9890/beads-workbench -w cmd internal"
  exit 1
fi
go mod tidy
if ! git diff --exit-code go.mod go.sum; then
  echo "go.mod/go.sum not tidy. Run 'go mod tidy' and commit."
  exit 1
fi
"""

[tasks."hooks:install"]
description = "Install repo git hooks (one-time setup)"
dir = "{{config_root}}"
run = "git config core.hooksPath scripts/git-hooks"

[tasks.bwb]
description = "Build bwb and run interactively against this repo's own beads DB (release smoke check)"
dir = "{{config_root}}"
run = """
go build -o /tmp/bwb ./cmd/bwb
BD_NON_INTERACTIVE=1 /tmp/bwb
"""

[tasks."bwb:fixture"]
description = "Build bwb and run interactively against the embedded fixture (fresh temp dir each run)"
dir = "{{config_root}}"
run = """
go build -o /tmp/bwb ./cmd/bwb
repoPath="$(mktemp -d)"
sh internal/testing/e2e/embeddedfixture/setup.sh "$repoPath" internal/testing/e2e/embeddedfixture/seed.json
echo "fixture: $repoPath"
cd "$repoPath" && BD_NON_INTERACTIVE=1 /tmp/bwb
"""

[tasks.smoke]
description = "Build and run the bwb-smoke release smoke check. Defaults to this repo's beads DB; override with BWB_SMOKE_DIR=/path/to/other/repo"
dir = "{{config_root}}"
run = """
go build -o /tmp/bwb-smoke ./cmd/bwb-smoke
BD_NON_INTERACTIVE=1 /tmp/bwb-smoke --dir "${BWB_SMOKE_DIR:-.}" --readonly
"""

[tasks."verify:refresh"]
description = "Runtime verification of refresh-concurrency fix (5q6t.5)"
dir = "{{config_root}}"
run = "python scripts/verify_refresh_concurrency.py"
